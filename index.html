<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أهلاً بكم بموقع فيصل</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg1: #0b0b0d;
      --bg2: #17181d;
      --panel: rgba(24, 24, 27, 0.96);
      --panel-2: rgba(36, 36, 40, 0.92);
      --user: #0a84ff;
      --bot: #2c2c2e;
      --text: #ffffff;
      --muted: #b8bcc6;
      --accent1: #0a84ff;
      --accent2: #5e5ce6;
      --accent3: #ff2d55;
      --gold: #ffcc00;
      --green: #34c759;
      --orange: #ff9f0a;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(94,92,230,0.18), transparent 26%),
        radial-gradient(circle at bottom, rgba(10,132,255,0.12), transparent 24%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      text-align: center;
      padding: 40px 14px 130px;
    }

    h1 {
      margin: 0;
      font-size: 31px;
      font-weight: 900;
      letter-spacing: -0.4px;
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .heroCard {
      width: min(460px, 100%);
      margin: 22px auto 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      padding: 18px 16px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.18);
      backdrop-filter: blur(10px);
    }

    .heroTop {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .heroAvatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff7eb3, #7afcff);
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 20px;
    }

    .heroText {
      text-align: right;
    }

    .heroText b {
      display: block;
      font-size: 16px;
    }

    .heroText span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    #openBtn {
      margin-top: 14px;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(10,132,255,0.28);
    }

    #chatBox {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 14px;
      width: min(430px, calc(100% - 16px));
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
      overflow: hidden;
      display: none;
      box-shadow: 0 24px 60px rgba(0,0,0,0.42);
      z-index: 999;
      backdrop-filter: blur(16px);
    }

    #chatHeader {
      padding: 14px;
      background: var(--panel-2);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .headerTop {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      direction: ltr;
    }

    #xpPanel {
      width: 155px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 10px 12px;
      text-align: left;
      direction: ltr;
      flex-shrink: 0;
    }

    .xpHead {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 800;
    }

    #xpLevel {
      color: var(--gold);
    }

    #xpValue {
      color: white;
    }

    #xpRank {
      margin-top: 6px;
      font-size: 12px;
      color: #e5e7eb;
    }

    .xpBar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    #xpFill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--orange));
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .xpMeta {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .xpMeta span {
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 10px;
      color: #e5e7eb;
      font-weight: 700;
    }

    .headerRight {
      flex: 1;
      direction: rtl;
    }

    #botInfo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: right;
    }

    #avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff7eb3, #7afcff);
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 18px;
      flex-shrink: 0;
    }

    #botName b {
      display: block;
      font-size: 15px;
    }

    #botName span {
      font-size: 12px;
      color: #d0d0d6;
    }

    .topBtns {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .topBtn {
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: white;
      padding: 8px 11px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    #modeBar, #toolsBar, #quickBar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 12px;
      scrollbar-width: none;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(18,18,21,0.7);
    }

    #modeBar::-webkit-scrollbar,
    #toolsBar::-webkit-scrollbar,
    #quickBar::-webkit-scrollbar {
      display: none;
    }

    .modeBtn, .quickBtn, .toolBtn {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 800;
      color: white;
      background: #2c2c2e;
    }

    .activeMode {
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
    }

    #messages {
      height: 370px;
      overflow-y: auto;
      background: #000;
      padding: 12px;
      text-align: right;
      scroll-behavior: smooth;
    }

    .msg {
      width: fit-content;
      max-width: 82%;
      margin: 8px 0;
      padding: 10px 14px;
      border-radius: 22px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
      animation: fadeIn 0.18s ease;
    }

    .user {
      margin-right: auto;
      background: var(--user);
      color: white;
      border-bottom-right-radius: 8px;
    }

    .bot {
      margin-left: auto;
      background: var(--bot);
      color: white;
      border-bottom-left-radius: 8px;
    }

    .system {
      margin: 10px auto;
      background: rgba(255,255,255,0.08);
      color: #ddd;
      font-size: 12px;
      border-radius: 999px;
      padding: 8px 12px;
      max-width: 94%;
    }

    .typing {
      opacity: 0.8;
      font-style: italic;
    }

    .bot img {
      width: 100%;
      border-radius: 14px;
      margin-top: 8px;
      display: block;
    }

    .choiceWrap {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .choiceBtn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
    }

    .choiceMain {
      background: var(--accent1);
      color: white;
    }

    .choiceDark {
      background: #3a3a3c;
      color: white;
    }

    #chatInputArea {
      display: flex;
      gap: 8px;
      padding: 12px;
      background: rgba(22,22,24,0.96);
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    #msg {
      flex: 1;
      border: none;
      outline: none;
      border-radius: 18px;
      background: #1c1c1e;
      color: white;
      padding: 12px 14px;
      font-size: 14px;
    }

    #msg::placeholder {
      color: #9a9aa1;
    }

    #sendBtn {
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: white;
      padding: 12px 14px;
      font-weight: 800;
      cursor: pointer;
      min-width: 58px;
    }

    #genderBox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 20px;
    }

    #genderCard {
      width: min(370px, 100%);
      background: #17181d;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 22px 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    #genderCard h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    #genderCard p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .genderBtn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      margin-top: 10px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      color: white;
    }

    .maleBtn {
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
    }

    .femaleBtn {
      background: linear-gradient(135deg, var(--accent3), #ff7eb3);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 420px) {
      #messages { height: 330px; }
      h1 { font-size: 28px; }
      #xpPanel { width: 136px; padding: 8px 10px; }
      .heroCard { padding: 16px 14px; }
    }
  </style>
</head>
<body>

  <h1>أهلاً بكم بموقع فيصل</h1>
  <div class="sub">Bella نسخة مطوّرة + أوتو مود + مفردات أكثر 🔥</div>

  <div class="heroCard">
    <div class="heroTop">
      <div class="heroAvatar">B</div>
      <div class="heroText">
        <b>Bella 💕</b>
        <span>لهجة كويتية + مودات + نقاط + اقتراحات أكثر</span>
      </div>
    </div>
    <button id="openBtn" onclick="toggleChat()">افتح Bella 💬</button>
  </div>

  <div id="genderBox">
    <div id="genderCard">
      <h2>شلون تبين/تبي Bella تكلمج/ك؟</h2>
      <p>اختاري/اختر الصيغة من البداية</p>
      <button class="genderBtn maleBtn" onclick="setGender('male')">👨 كلّمني كأني ولد</button>
      <button class="genderBtn femaleBtn" onclick="setGender('female')">👩 كلّميني كأني بنت</button>
    </div>
  </div>

  <div id="chatBox">
    <div id="chatHeader">
      <div class="headerTop">
        <div id="xpPanel">
          <div class="xpHead">
            <span id="xpLevel">LVL 1</span>
            <span id="xpValue">0 XP</span>
          </div>

          <div id="xpRank">الرتبة: مبتدئ</div>

          <div class="xpBar">
            <div id="xpFill"></div>
          </div>

          <div class="xpMeta">
            <span id="xpCombo">Combo: 0</span>
            <span id="xpAch">Ach: 0</span>
          </div>
        </div>

        <div class="headerRight">
          <div id="botInfo">
            <div id="avatar">B</div>
            <div id="botName">
              <b>Bella 💕</b>
              <span id="statusText">موجودة</span>
            </div>
          </div>

          <div class="topBtns">
            <button class="topBtn" onclick="showSuggestions()">اقتراحات</button>
            <button class="topBtn" onclick="clearChat()">مسح</button>
            <button class="topBtn" onclick="resetAll()">إعادة</button>
            <button class="topBtn" onclick="toggleChat()">✕</button>
          </div>
        </div>
      </div>
    </div>

    <div id="modeBar">
      <button id="modeAuto" class="modeBtn activeMode" onclick="setMode('auto')">🤖 أوتو</button>
      <button id="modeCute" class="modeBtn" onclick="setMode('cute')">💕 دلع</button>
      <button id="modeFun" class="modeBtn" onclick="setMode('fun')">😎 فلة</button>
      <button id="modeCalm" class="modeBtn" onclick="setMode('calm')">🤍 رايق</button>
      <button id="modeMad" class="modeBtn" onclick="setMode('mad')">😒 معصبة</button>
    </div>

    <div id="toolsBar">
      <button class="toolBtn" onclick="quickSend('اسمي فيصل')">حفظ اسم</button>
      <button class="toolBtn" onclick="quickSend('منو انا')">منو أنا</button>
      <button class="toolBtn" onclick="quickSend('نقاطي')">نقاطي</button>
      <button class="toolBtn" onclick="quickSend('رتبتي')">رتبتي</button>
      <button class="toolBtn" onclick="quickSend('شفيك شلونك عساك بخير')">سؤال عام</button>
    </div>

    <div id="quickBar">
      <button class="quickBtn" onclick="quickSend('هلا')">هلا</button>
      <button class="quickBtn" onclick="quickSend('هلا والله')">هلا والله</button>
      <button class="quickBtn" onclick="quickSend('شلونك')">شلونك</button>
      <button class="quickBtn" onclick="quickSend('شفيك شلونك عساك بخير')">شفيك شلونك</button>
      <button class="quickBtn" onclick="quickSend('شفيج شلونج عساج بخير')">شفيج شلونج</button>
      <button class="quickBtn" onclick="quickSend('نور')">نور</button>
      <button class="quickBtn" onclick="quickSend('نور دنياي')">نور دنياي</button>
      <button class="quickBtn" onclick="quickSend('ثامر')">ثامر</button>
      <button class="quickBtn" onclick="quickSend('نكت لكزس')">نكت لكزس</button>
      <button class="quickBtn" onclick="quickSend('احبك')">احبك</button>
      <button class="quickBtn" onclick="quickSend('فديتك')">فديتك</button>
      <button class="quickBtn" onclick="quickSend('طفشان')">طفشان</button>
      <button class="quickBtn" onclick="quickSend('شكو')">شكو</button>
      <button class="quickBtn" onclick="quickSend('شدعوه')">شدعوه</button>
      <button class="quickBtn" onclick="quickSend('أفا')">أفا</button>
      <button class="quickBtn" onclick="quickSend('قهوة')">قهوة</button>
      <button class="quickBtn" onclick="quickSend('احب اللكزس')">احب اللكزس</button>
      <button class="quickBtn" onclick="quickSend('ابي سوالف')">ابي سوالف</button>
      <button class="quickBtn" onclick="quickSend('زوط')">زوط</button>
      <button class="quickBtn" onclick="quickSend('زربه')">زربه</button>
      <button class="quickBtn" onclick="quickSend('انمحنت')">انمحنت</button>
      <button class="quickBtn" onclick="quickSend('تزوجيني')">تزوجيني</button>
    </div>

    <div id="messages"></div>

    <div id="chatInputArea">
      <input id="msg" type="text" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button id="sendBtn" onclick="sendMessage()">إرسال</button>
    </div>
  </div>

  <script>
    let currentMode = "auto";
    let userGender = "male";
    let userName = "";
    let xp = 0;
    let combo = 0;
    let messageCount = 0;
    let achievements = {};

    const XP_STEP = 20;

    const messages = document.getElementById("messages");
    const statusText = document.getElementById("statusText");
    const xpLevelText = document.getElementById("xpLevel");
    const xpValueText = document.getElementById("xpValue");
    const xpRankText = document.getElementById("xpRank");
    const xpFill = document.getElementById("xpFill");
    const xpComboText = document.getElementById("xpCombo");
    const xpAchText = document.getElementById("xpAch");

    function toggleChat() {
      const chatBox = document.getElementById("chatBox");
      chatBox.style.display = chatBox.style.display === "block" ? "none" : "block";
    }

    function setStatus(text) {
      statusText.innerText = text;
    }

    function setGender(g) {
      userGender = g;
      localStorage.setItem("bella_gender", g);
      document.getElementById("genderBox").style.display = "none";
      updateXPUI();

      if (messages.innerHTML.trim() === "") {
        addMessage(getWelcomeMessage(), "bot", true);
      }

      dailyBonus();
    }

    function setMode(mode) {
      currentMode = mode;
      localStorage.setItem("bella_mode", mode);

      document.getElementById("modeAuto").classList.remove("activeMode");
      document.getElementById("modeCute").classList.remove("activeMode");
      document.getElementById("modeFun").classList.remove("activeMode");
      document.getElementById("modeCalm").classList.remove("activeMode");
      document.getElementById("modeMad").classList.remove("activeMode");

      if (mode === "auto") document.getElementById("modeAuto").classList.add("activeMode");
      if (mode === "cute") document.getElementById("modeCute").classList.add("activeMode");
      if (mode === "fun") document.getElementById("modeFun").classList.add("activeMode");
      if (mode === "calm") document.getElementById("modeCalm").classList.add("activeMode");
      if (mode === "mad") document.getElementById("modeMad").classList.add("activeMode");

      updateModeStatus(mode);
    }

    function updateModeStatus(mode) {
      const map = {
        auto: "أوتو",
        cute: "دلع",
        fun: "فلة",
        calm: "رايق",
        mad: "معصبة"
      };

      if (mode === "auto") {
        setStatus("موجودة • مود: أوتو");
      } else {
        setStatus("موجودة • مود: " + map[mode]);
      }
    }

    function detectAutoMode(msg) {
      if (includesAny(msg, [
        "احبك", "احبج", "فديتك", "فديتج", "نور", "نور دنياي",
        "يا عمري", "يا حلو", "يا بعد جبدي", "يا بعد عمري"
      ])) return "cute";

      if (includesAny(msg, [
        "ثامر", "لكزس", "نكت", "ضحكني", "زوط", "ابي سوالف",
        "ونس", "فلة", "احب اللكزس", "احب السيارات"
      ])) return "fun";

      if (includesAny(msg, [
        "شلونك", "شلونج", "شفيك", "شفيج", "عساك بخير", "عساج بخير",
        "قهوة", "شكرا", "بخير", "وينك", "وينج", "رتبتي", "نقاطي"
      ])) return "calm";

      if (includesAny(msg, [
        "زربه", "معصب", "زعلان", "مقهور", "طفشان", "طفشانة",
        "شدعوه", "أفا", "شكو", "قهرتني", "قهرتيني"
      ])) return "mad";

      return "cute";
    }

    function resolvedMode(msg = "") {
      if (currentMode !== "auto") return currentMode;
      return detectAutoMode(msg);
    }

    function getLevel() {
      return Math.floor(xp / XP_STEP) + 1;
    }

    function getLevelProgress() {
      return Math.floor(((xp % XP_STEP) / XP_STEP) * 100);
    }

    function getRank() {
      if (xp >= 150) return "فيلسوف";
      if (xp >= 110) return "مسولفجي عظيم";
      if (xp >= 75) return "مسولفجي";
      if (xp >= 45) return "راعي سوالف";
      if (xp >= 20) return "متفاعل";
      return "مبتدئ";
    }

    function achievementCount() {
      return Object.keys(achievements).filter(k => achievements[k]).length;
    }

    function updateXPUI() {
      xpLevelText.innerText = "LVL " + getLevel();
      xpValueText.innerText = xp + " XP";
      xpRankText.innerText = "الرتبة: " + getRank();
      xpFill.style.width = getLevelProgress() + "%";
      xpComboText.innerText = "Combo: " + combo;
      xpAchText.innerText = "Ach: " + achievementCount();
    }

    function saveXPState() {
      localStorage.setItem("bella_xp", xp);
      localStorage.setItem("bella_combo", combo);
      localStorage.setItem("bella_message_count", messageCount);
      localStorage.setItem("bella_achievements", JSON.stringify(achievements));
    }

    function addMessage(text, type, skipSave = false) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.innerText = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;

      if (!skipSave) saveChatItem({ kind: "text", type, text });
    }

    function addSystem(text) {
      const div = document.createElement("div");
      div.className = "system";
      div.innerText = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function addTyping(mode = "auto") {
      setStatus(mode === "auto" ? "تكتب..." : "تكتب • " + modeLabel(mode));
      const div = document.createElement("div");
      div.className = "msg bot typing";
      div.id = "typingBox";
      div.innerText = "Bella تكتب...";
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById("typingBox");
      if (typing) typing.remove();
      updateModeStatus(currentMode);
    }

    function modeLabel(mode) {
      const map = {
        cute: "دلع",
        fun: "فلة",
        calm: "رايق",
        mad: "معصبة",
        auto: "أوتو"
      };
      return map[mode] || "أوتو";
    }

    function addXP(amount, reason = "", showNotice = false) {
      const oldLevel = getLevel();
      xp += amount;
      saveXPState();
      updateXPUI();

      if (showNotice && reason) {
        addSystem("+" + amount + " XP • " + reason);

    function normalizeArabic(text) {
      return text
        .replace(/[أإآ]/g, "ا")
        .replace(/ة/g, "ه")
        .replace(/ى/g, "ي")
        .replace(/ؤ/g, "و")
        .replace(/ئ/g, "ي")
        .replace(/گ/g, "ك")
        .replace(/چ/g, "ج")
        .replace(/ـ/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }

    function includesAny(msg, arr) {
      return arr.some(word => msg.includes(word));
    }

    function getRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function byMode(msg, cute, fun, calm, mad) {
      const mode = resolvedMode(normalizeArabic(msg));
      if (mode === "cute") return cute;
      if (mode === "fun") return fun;
      if (mode === "calm") return calm;
      return mad;
    }

    function g(maleText, femaleText) {
      return userGender === "female" ? femaleText : maleText;
    }

    function extractName(text) {
      const raw = text.trim();
      const lower = normalizeArabic(raw);

      if (lower.startsWith("اسمي ")) return raw.slice(5).trim();
      if (lower.startsWith("انا ")) return raw.slice(4).trim();
      if (lower.startsWith("أنا ")) return raw.slice(4).trim();

      return "";
    }

    function sendMessage() {
      const input = document.getElementById("msg");
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";

      messageCount++;
      addXP(2, "رسالة جديدة", false);
      addCombo();
      saveXPState();

      const msgNormalized = normalizeArabic(text);
      const mode = resolvedMode(msgNormalized);
      const reply = getBotReply(text);

      addTyping(mode);
      setTimeout(() => {
        removeTyping();

        if (reply === "__THAMER_SPECIAL__") {
          addImageMessage("IMG_4228.jpeg");
        } else if (reply === "__NUR_SPECIAL__") {
          addNurOptions();
        } else {
          addMessage(reply, "bot");
        }

        updateXPUI();
      }, 260);
    }

    function saveChatItem(item) {

      localStorage.setItem("bella_chat", JSON.stringify(old));

    function loadChat() {
      const old = JSON.parse(localStorage.getItem("bella_chat") || "[]");
      if (old.length === 0) {
        addMessage(getWelcomeMessage(), "bot", true);
        return;
      }

      old.forEach(item => {
        if (item.kind === "text") {
          addMessage(item.text, item.type, true);
        } else if (item.kind === "thamer_image") {
          addImageMessage(item.src, true);
        }
      });
    }

    function clearChat() {
      localStorage.removeItem("bella_chat");
      messages.innerHTML = "";
      addMessage(getWelcomeMessage(), "bot", true);
    }

    function resetAll() {
      localStorage.removeItem("bella_chat");
      localStorage.removeItem("bella_name");
      localStorage.removeItem("bella_xp");
      localStorage.removeItem("bella_combo");
      localStorage.removeItem("bella_message_count");
      localStorage.removeItem("bella_mode");
      localStorage.removeItem("bella_gender");
      localStorage.removeItem("bella_achievements");
      localStorage.removeItem("bella_daily_bonus");

      userName = "";
      xp = 0;
      combo = 0;
      messageCount = 0;
      achievements = {};
      currentMode = "auto";
      userGender = "male";

      messages.innerHTML = "";
      document.getElementById("genderBox").style.display = "flex";
      setMode("auto");
      updateXPUI();
    }

    function getWelcomeMessage() {
      const hour = new Date().getHours();
      const namePart = userName ? " " + userName : "";

      if (hour < 12) {
        return userGender === "female"
          ? "صباح الخير" + namePart + " يا قلبي 💕"
          : "صباح الخير" + namePart + " يا حلو 🤍";
      }

      if (hour < 18) {
        return userGender === "female"
          ? "ياهلا والله" + namePart + "، شلونج؟ 💕"
          : "ياهلا والله" + namePart + "، شلونك؟ 🤍";
      }

      return userGender === "female"
        ? "مساء الخير" + namePart + " يا بعد عمري 💕"
        : "مساء الخير" + namePart + " يا بعد قلبي 🤍";
    }

    function restoreAll() {
      const savedGender = localStorage.getItem("bella_gender");
      if (savedGender) {
        userGender = savedGender;
        document.getElementById("genderBox").style.display = "none";
      }

      const savedMode = localStorage.getItem("bella_mode");
      if (savedMode) {
        setMode(savedMode);
      } else {
        setMode("auto");
      }

      const savedName = localStorage.getItem("bella_name");
      if (savedName) userName = savedName;

      xp = parseInt(localStorage.getItem("bella_xp") || "0", 10) || 0;
      combo = parseInt(localStorage.getItem("bella_combo") || "0", 10) || 0;
      messageCount = parseInt(localStorage.getItem("bella_message_count") || "0", 10) || 0;
      achievements = JSON.parse(localStorage.getItem("bella_achievements") || "{}");

      updateXPUI();
      dailyBonus();
      loadChat();
    }

    restoreAll();
  </script>
</body>
</html>
