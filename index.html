<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faisal Chat</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 60px;
    }

    h1 {
      color: #00ffcc;
    }

    #openBtn {
      padding: 12px 22px;
      background: #00ffcc;
      color: black;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    #chatBox {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 310px;
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 18px;
      overflow: hidden;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    #chatHeader {
      background: #00ffcc;
      color: black;
      padding: 12px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #closeBtn {
      background: transparent;
      border: none;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
      color: black;
    }

    #messages {
      height: 280px;
      overflow-y: auto;
      padding: 10px;
      text-align: left;
      background: #161616;
    }

    .msg {
      margin: 8px 0;
      padding: 10px 12px;
      border-radius: 12px;
      max-width: 85%;
      word-wrap: break-word;
      line-height: 1.5;
    }

    .user {
      background: #00ffcc;
      color: black;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #2a2a2a;
      color: white;
      margin-right: auto;
      text-align: left;
    }

    #chatInputArea {
      display: flex;
      gap: 8px;
      padding: 10px;
      background: #1b1b1b;
    }

    #msg {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      border-radius: 10px;
      font-size: 14px;
    }

    #sendBtn {
      padding: 10px 14px;
      background: #00ffcc;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>مرحبا فيصل 🔥</h1>
  <button id="openBtn" onclick="toggleChat()">افتح المحادثة 💬</button>

  <div id="chatBox">
    <div id="chatHeader">
      <span>بوت فيصل 🤖</span>
      <button id="closeBtn" onclick="toggleChat()">✕</button>
    </div>

    <div id="messages">
      <div class="msg bot">هلا والله، أنا موجود 😎</div>
    </div>

    <div id="chatInputArea">
      <input id="msg" type="text" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button id="sendBtn" onclick="sendMessage()">إرسال</button>
    </div>
  </div>

  <script>
    function toggleChat() {
      const chatBox = document.getElementById("chatBox");
      chatBox.style.display = chatBox.style.display === "block" ? "none" : "block";
    }

    function addMessage(text, type) {
      const messages = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.innerText = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function getBotReply(text) {
      const msg = text.toLowerCase().trim();

      if (msg.includes("نور")) {
        return "نور دنيايييي هوايييي ومايييي 🤍";
      } else if (msg.includes("هلا") || msg.includes("السلام") || msg.includes("مرحبا")) {
        return "هلا والله يا بعدهم 🔥";
      } else if (msg.includes("شلونك") || msg.includes("كيفك")) {
        return "بخير دامك موجود 😌";
      } else if (msg.includes("اسمك")) {
        return "أنا بوت فيصل، بالخدمة 😎";
      } else if (msg.includes("احبك")) {
        return "وأنا أحبك أكثررر 🤍";
      } else if (msg.includes("فديتك") || msg.includes("احب")) {
        return "افداك الكون كله 😏";
      } else if (msg.includes("منو فيصل") || msg.includes("من هو فيصل")) {
        return "فيصل شخص رهيب وما عليه كلام 🔥";
      } else if (msg.includes("باي") || msg.includes("مع السلامه")) {
        return "مع السلامة يا الغالي 🤍";
      } else if (msg.includes("وينك")) {
        return "موجود هنا وأنت نادني بس 😎";
      } else if (msg.includes("تمام")) {
        return "دامك تمام أنا تمام 🔥";
      } else if (msg.includes("زعلان")) {
        return "لا تزعل، أنا هنا معك 🤍";
      } else if (msg.includes("ضحكني")) {
        return "أضحكك؟ يكفي إنك دخلت الشات وخليته أفخم شات 😎";
      } else {
        const randomReplies = [
          "ههههه حلوو، كمل 😎",
          "يا سلام عليك 🔥",
          "أقولك الصدق؟ كلامك يعجبني 😏",
          "كمّل أنا سامعك 🤍",
          "مو فاهم 100% بس عاجبني جوك 😆"
        ];
        return randomReplies[Math.floor(Math.random() * randomReplies.length)];
      }
    }

    function sendMessage() {
      const input = document.getElementById("msg");
      const text = input.value.trim();

      if (text === "") return;

      addMessage(text, "user");

      const reply = getBotReply(text);

      setTimeout(() => {
        addMessage(reply, "bot");
      }, 400);

      input.value = "";
    }
  </script>

</body>
</html>
