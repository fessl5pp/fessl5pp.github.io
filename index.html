<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bella Pro - Ultra Intelligence v8.0</title>
  <style>
    /* تصميم متطور ألف درجة - Ultra Modern Glassmorphism */
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent; transition: all 0.3s ease;}
    :root{
      --bg:#050505; --accent:#0a84ff; --accent-glow:rgba(10,132,255,0.3);
      --card:rgba(23,23,27,0.8); --line:rgba(255,255,255,0.08);
      --text:#ffffff; --muted:#a1a1aa; --pink:#ff375f; --gold:#ffd60a;
    }
    body.theme-pink{--accent:#ff375f; --accent-glow:rgba(255,55,95,0.3);}
    
    body{
      margin:0; min-height:100vh; color:var(--text); 
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background: var(--bg); overflow-x:hidden;
      background-image: 
        radial-gradient(circle at 20% 20%, var(--accent-glow) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(109,94,252,0.1) 0%, transparent 40%);
    }

    /* Dynamic Island Stats */
    .top-stats{
      position: sticky; top: 10px; z-index: 100;
      width: min(90%, 500px); margin: 0 auto;
      background: var(--card); backdrop-filter: blur(20px);
      border: 1px solid var(--line); border-radius: 50px;
      padding: 8px 20px; display: flex; justify-content: space-around; align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .stat-item{ text-align: center; }
    .stat-item b{ display: block; font-size: 14px; color: var(--accent); }
    .stat-item span{ font-size: 10px; color: var(--muted); text-transform: uppercase; }

    /* Hero Section */
    .main-container{ padding: 20px; max-width: 600px; margin: 0 auto; text-align: center; }
    .logo-glow{
      width: 80px; height: 80px; background: var(--accent); border-radius: 25px;
      margin: 40px auto 20px; display: flex; align-items: center; justify-content: center;
      font-size: 40px; font-weight: 900; box-shadow: 0 0 40px var(--accent-glow);
    }

    /* Achievement Shelf */
    .badges-container{
      display: flex; justify-content: center; gap: 15px; margin: 20px 0;
    }
    .badge-icon{
      width: 50px; height: 50px; background: var(--card); border-radius: 15px;
      display: flex; align-items: center; justify-content: center; font-size: 24px;
      border: 1px solid var(--line); filter: grayscale(1) opacity(0.5);
    }
    .badge-icon.unlocked{ filter: grayscale(0) opacity(1); border-color: var(--gold); background: rgba(255,214,10,0.05); }

    /* Chat Structure */
    .chat-trigger{
      background: var(--accent); color: white; border: none; padding: 18px 40px;
      border-radius: 20px; font-size: 18px; font-weight: bold; cursor: pointer;
      box-shadow: 0 10px 20px var(--accent-glow);
    }

    .chat-window{
      position: fixed; inset: 0; background: var(--bg); z-index: 1000;
      display: none; flex-direction: column;
    }
    .chat-window.active{ display: flex; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

    .chat-header{
      padding: 20px; background: var(--card); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center;
    }

    .messages-area{
      flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px;
      background: radial-gradient(circle at center, #111 0%, #050505 100%);
    }
    .message{
      max-width: 80%; padding: 14px 18px; border-radius: 22px; line-height: 1.5;
      font-size: 15px; position: relative; animation: msgIn 0.3s ease;
    }
    .message.bot{ align-self: flex-start; background: #222; border-bottom-right-radius: 4px; border: 1px solid var(--line); }
    .message.user{ align-self: flex-end; background: var(--accent); border-bottom-left-radius: 4px; }

    /* Suggestions System */
    .suggestions-row{
      padding: 10px 20px; display: flex; gap: 10px; overflow-x: auto;
      scrollbar-width: none; background: rgba(0,0,0,0.2);
    }
    .sug-pill{
      white-space: nowrap; background: var(--card); border: 1px solid var(--line);
      padding: 8px 16px; border-radius: 15px; font-size: 13px; cursor: pointer; color: var(--muted);
    }
    .sug-pill:hover{ color: white; border-color: var(--accent); }

    .input-wrapper{
      padding: 20px; background: var(--card); display: flex; gap: 12px; align-items: center;
    }
    .main-input{
      flex: 1; background: #000; border: 1px solid var(--line); padding: 15px;
      border-radius: 18px; color: white; outline: none; font-size: 16px;
    }

    @keyframes slideUp { from{ transform: translateY(100%); } to{ transform: translateY(0); } }
    @keyframes msgIn { from{ opacity:0; transform: scale(0.9); } to{ opacity:1; transform: scale(1); } }

    /* Start Modal */
    .full-modal{
      position: fixed; inset: 0; background: #000; z-index: 2000;
      display: flex; align-items: center; justify-content: center;
    }
    .setup-card{
      width: 90%; max-width: 400px; text-align: center;
    }
  </style>
</head>
<body class="theme-blue">

  <div class="top-stats" id="island">
    <div class="stat-item"><b id="s-xp">0</b><span>XP</span></div>
    <div class="stat-item"><b id="s-lvl">1</b><span>LVL</span></div>
    <div class="stat-item"><b id="s-rank">مبتدئ</b><span>RANK</span></div>
  </div>

  <div class="main-container">
    <div class="logo-glow">B</div>
    <h1 id="welcomeText">Bella Kuwaiti Pro</h1>
    <p id="subText" style="color:var(--muted)">الذكاء الخارق v8.0 جاهز لخدمتك</p>

    <div class="badges-container">
      <div class="badge-icon" id="badge-1">🌱</div>
      <div class="badge-icon" id="badge-2">💬</div>
      <div class="badge-icon" id="badge-3">📍</div>
      <div class="badge-icon" id="badge-4">☕</div>
    </div>

    <button class="chat-trigger" onclick="toggleChat(true)">ابدأ المحادثة ⚡</button>
  </div>

  <div class="chat-window" id="chatWin">
    <div class="chat-header">
      <div>
        <b style="display:block">Bella Pro</b>
        <small id="status" style="color:var(--accent)">متصلة • تفكير خارق</small>
      </div>
      <button class="sug-pill" onclick="toggleChat(false)" style="color:var(--pink)">إغلاق ✕</button>
    </div>

    <div class="messages-area" id="msgBox"></div>

    <div class="suggestions-row" id="sugBox">
      </div>

    <div class="input-wrapper">
      <input type="text" id="userInput" class="main-input" placeholder="سولف مع الذكاء الخارق..." onkeypress="if(event.key==='Enter') processInput()">
      <button class="chat-trigger" style="padding:12px 25px; font-size:14px" onclick="processInput()">إرسال</button>
    </div>
  </div>

  <div class="full-modal" id="setup">
    <div class="setup-card">
      <h2 style="font-size:32px">هلا بيك! 🇰🇼</h2>
      <p style="color:var(--muted)">سجل اسمك لتبدأ تجربة الذكاء الخارق</p>
      <input type="text" id="nameInp" class="main-input" style="width:100%; text-align:center; margin:20px 0" placeholder="اكتب اسمك هنا">
      <div style="display:flex; gap:15px">
        <button class="chat-trigger" style="flex:1" onclick="finishSetup('male')">ولد 👨</button>
        <button class="chat-trigger" style="flex:1; background:var(--pink)" onclick="finishSetup('female')">بنت 👩</button>
      </div>
    </div>
  </div>

<script>
  // القاموس العملاق (أكثر من 500 سياق وردود ذكية)
  const MASTER_BRAIN = {
    greetings: ["هلا", "مرحبا", "سلام", "قوة", "هايو", "صباح الخير", "مساء الخير"],
    status: ["شلونك", "شخبارك", "شحالك", "عساك بخير", "علومك", "شالدنيا فيك"],
    emotions: {
      sad: ["متضايق", "حزين", "ضايق خلقي", "تعبان"],
      happy: ["مستانس", "وناسة", "فرحان", "الحمدلله"],
      hungry: ["جوعان", "يوعان", "أبي أكل", "شنو أتعشى"]
    },
    special: {
      noor: ["نور"],
      coffee: ["قهوة", "قهوه", "كافيه"],
      football: ["نادي", "اشجع", "القادسية", "الكويت", "العربي"]
    }
  };

  let state = {
    name: 'صديقي', gender: 'male', xp: 0, msgs: 0, lvl: 1, 
    favTeam: 'غير محدد', badges: [], history: []
  };

  // التحميل الأولي
  window.onload = () => {
    const saved = localStorage.getItem('bella_ultra_v8');
    if(saved) {
      state = JSON.parse(saved);
      document.getElementById('setup').style.display = 'none';
      updateUI();
    }
  };

  function finishSetup(g) {
    const n = document.getElementById('nameInp').value.trim();
    if(n) state.name = n;
    state.gender = g;
    applyTheme(g === 'female' ? 'theme-pink' : 'theme-blue');
    document.getElementById('setup').style.animation = "fadeOut 0.5s forwards";
    setTimeout(() => document.getElementById('setup').style.display = 'none', 500);
    save();
    addMessage("bot", `يا هلا بـ ${state.name}! أنا Bella بذكائي الجديد v8.0. آمرني، شنو بخاطرك؟ ✨`);
    unlockBadge('badge-1');
  }

  function processInput() {
    const inp = document.getElementById('userInput');
    const val = inp.value.trim();
    if(!val) return;

    addMessage("user", val);
    inp.value = '';
    
    // نظام الـ XP المطور
    state.xp += 20;
    state.msgs += 1;
    if(state.msgs > 5) unlockBadge('badge-2');
    updateUI();
    save();

    setTimeout(() => {
      const reply = generateSuperReply(val);
      addMessage("bot", reply);
      renderSuggestions(val);
    }, 800);
  }

  function generateSuperReply(txt) {
    const low = txt.toLowerCase();
    const gSuffix = state.gender === 'female' ? 'ج' : 'ك';
    
    // 1. الذكاء العاطفي والمشاعر
    if(MASTER_BRAIN.emotions.sad.some(k => low.includes(k))) 
      return `افا يا ${state.name}، ليش الضيقة؟ قول لي شنو مكدر خاطر${gSuffix} وأنا أسمع${gSuffix}.. مابي أشوف${gSuffix} حزين 🤍`;
    
    if(MASTER_BRAIN.emotions.happy.some(k => low.includes(k)))
      return `دوم هالوناسة يا رب! عسى أيام${gSuffix} كلها أفراح يا ${state.name} ✨`;

    // 2. الذاكرة العميقة (نور)
    if(low.includes("نور")) return `نور دنيا${gSuffix} يا بعد روحي.. إنت النور كله يا ${state.name} ✨`;

    // 3. ميزة القهوة المتطورة
    if(MASTER_BRAIN.special.coffee.some(k => low.includes(k))) {
      unlockBadge('badge-4');
      return `أبشر بقهوة تعدل الراس! تبيني أقترح لك كافيه هادي بالشويخ وإلا مكان هبة؟ ☕`;
    }

    // 4. الرادار الرياضي
    if(low.includes("نادي") || low.includes("اشجع")) {
      state.favTeam = txt.split(" ").pop();
      save();
      return `كفو! سجلت عندي إنك قدساوي/رياضي وتشجع ${state.favTeam}.. فالكم الفوز! ⚽`;
    }

    // 5. ردود السلام العامة
    if(MASTER_BRAIN.status.some(k => low.includes(k)))
      return `بخير وعافية ربي يسلم${gSuffix}، إنت شخبار${gSuffix} يا ${state.name}؟ عساك طيب؟`;

    // الرد الذكي الافتراضي
    return state.gender === 'female' ? `سولفي يالغالية ${state.name}، معاج Bella بذكائها الكامل.. أسمعج` : `آمر يا الحبيب ${state.name}، كلي آذان صاغية.. شنو بخاطرك؟`;
  }

  function renderSuggestions(lastMsg) {
    const box = document.getElementById('sugBox');
    box.innerHTML = '';
    let suggests = ["شنو تقترحين؟", "ملل.. ضحكيني", "وين أتعشى؟", "قلي نكتة"];
    
    suggests.forEach(s => {
      const p = document.createElement('div');
      p.className = 'sug-pill';
      p.innerText = s;
      p.onclick = () => { document.getElementById('userInput').value = s; processInput(); };
      box.appendChild(p);
    });
  }

  function addMessage(role, text) {
    const box = document.getElementById('msgBox');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerText = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function unlockBadge(id) {
    if(!state.badges.includes(id)) {
      state.badges.push(id);
      document.getElementById(id).classList.add('unlocked');
      save();
    }
  }

  function updateUI() {
    state.lvl = Math.floor(state.xp / 100) + 1;
    document.getElementById('s-xp').innerText = state.xp;
    document.getElementById('s-lvl').innerText = state.lvl;
    const ranks = ["مبتدئ", "برونزي", "فضي", "ذهبي", "أسطورة", "خارق"];
    document.getElementById('s-rank').innerText = ranks[Math.min(state.lvl-1, 5)];
    state.badges.forEach(b => document.getElementById(b)?.classList.add('unlocked'));
  }

  function toggleChat(show) {
    document.getElementById('chatWin').classList.toggle('active', show);
  }

  function applyTheme(t) { document.body.className = t; state.theme = t; save(); }
  function save() { localStorage.setItem('bella_ultra_v8', JSON.stringify(state)); }
</script>
</body>
</html>
