<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أهلاً بكم بموقع فيصل</title>

<style>
body{background:#111;color:white;font-family:Arial;text-align:center;padding-top:50px}
h1{color:#00ffcc}

#openBtn{padding:12px 20px;background:#00ffcc;border:none;border-radius:12px;font-weight:bold}

#chatBox{position:fixed;bottom:20px;left:20px;width:340px;background:#1b1b1b;border-radius:20px;display:none}

#chatHeader{background:#00ffcc;color:black;padding:10px;display:flex;justify-content:space-between}

#messages{height:250px;overflow:auto;padding:10px;background:#161616}

.msg{margin:6px;padding:8px;border-radius:10px}
.user{background:#00ffcc;color:black;text-align:right}
.bot{background:#2a2a2a}

#inputArea{display:flex;padding:10px;gap:5px}
#msg{flex:1;padding:8px;border-radius:10px;border:none}

button{cursor:pointer}

.quick{display:flex;flex-wrap:wrap;gap:5px;padding:5px}
.quick button{background:#333;color:white;border:none;border-radius:8px;padding:5px}
</style>
</head>

<body>

<h1>أهلاً بكم بموقع فيصل</h1>
<button id="openBtn" onclick="toggleChat()">افتح Bella 💬</button>

<div id="chatBox">
  <div id="chatHeader">
    Bella 💕
    <button onclick="toggleChat()">✕</button>
  </div>

  <div class="quick">
    <button onclick="quick('هلا')">هلا</button>
    <button onclick="quick('نور')">نور</button>
    <button onclick="quick('احبك')">احبك</button>
    <button onclick="quick('طفشان')">طفشان</button>
  </div>

  <div id="messages">
    <div class="msg bot">هلا والله أنا Bella 💕</div>
  </div>

  <div id="inputArea">
    <input id="msg" placeholder="اكتب...">
    <button onclick="send()">إرسال</button>
    <button onclick="startVoice()">🎤</button>
  </div>
</div>

<script>
function toggleChat(){
let box=document.getElementById("chatBox");
box.style.display=box.style.display=="block"?"none":"block";
}

function add(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
messages.appendChild(div);
messages.scrollTop=messages.scrollHeight;
}

function quick(t){
document.getElementById("msg").value=t;
send();
}

function reply(msg){

// 🔥 ردك الأساسي (نور)
if(msg.includes("نور")){
return "نور دنيايييي هوايييي ومايييي 🤍";
}

// باقي الردود بدون حذف
if(msg.includes("هلا")||msg.includes("مرحبا")){
return "هلا والله 🔥";
}
if(msg.includes("شلونك")){
return "بخير دامك موجود 😌";
}
if(msg.includes("احبك")){
return "وأنا أكثررر 🤍";
}
if(msg.includes("طفشان")){
return "تعال أكسر طفشك 😎";
}
if(msg.includes("اسمك")){
return "أنا Bella 💕";
}
if(msg.includes("شكرا")){
return "العفو 🤍";
}
if(msg.includes("زعلان")){
return "لا تزعل أنا معك 🤍";
}

// ردود إضافية جديدة
if(msg.includes("وينك")){
return "معك هون دايم 😎";
}
if(msg.includes("اشتقت")){
return "وأنا أكثر 💕";
}
if(msg.includes("احب فيصل")){
return "ذوقك رهيب 🔥";
}
if(msg.includes("باي")){
return "مع السلامة 🤍";
}

// fallback
let arr=[
"كمل كلامك 😏",
"واضح عندك سوالف 🔥",
"عجبني كلامك 😎",
"قول أكثر 🤍"
];
return arr[Math.floor(Math.random()*arr.length)];
}

function send(){
let input=document.getElementById("msg");
let text=input.value.trim();
if(!text)return;

add(text,"user");

let r=reply(text.toLowerCase());

setTimeout(()=>{
add(r,"bot");
speak(r);
},300);

input.value="";
}

function speak(text){
let sp=new SpeechSynthesisUtterance(text);
sp.lang="ar-SA";
speechSynthesis.speak(sp);
}

// 🎤 تسجيل صوت
function startVoice(){
let rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.lang="ar-SA";
rec.start();

rec.onresult=function(e){
let t=e.results[0][0].transcript;
document.getElementById("msg").value=t;
send();
};
}
</script>

</body>
</html>
