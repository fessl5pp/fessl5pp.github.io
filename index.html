<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bella Kuwaiti Pro</title>
  <style>
    /* التنسيقات الأساسية للحفاظ على شكل الموقع الاحترافي */
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#09090b;--bg2:#121317;--panel:rgba(23,24,29,.92);--panel2:rgba(34,36,44,.95);
      --line:rgba(255,255,255,.08);--text:#fff;--muted:#b5bac5;--accent:#0a84ff;--accent2:#6d5efc;
      --pink:#ff4d8d;--gold:#ffcc00;--orange:#ff9f0a;--bot:#2b2d33;--user:#0a84ff;--bubble:#1b1d23;
      --shadow:0 22px 55px rgba(0,0,0,.35)
    }
    body.theme-pink{--accent:#ff4d8d;--accent2:#ff8db7;--user:#ff4d8d}
    body.theme-blue{--accent:#0a84ff;--accent2:#6d5efc;--user:#0a84ff}
    body.theme-gold{--accent:#ff9f0a;--accent2:#ffcc00;--user:#ff9f0a}
    body{margin:0;min-height:100vh;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial,sans-serif;
      background:radial-gradient(circle at top, rgba(109,94,252,.16), transparent 24%),linear-gradient(180deg,var(--bg),var(--bg2));
      padding:24px 14px 120px;text-align:center}
    
    .hero{width:min(560px,100%);margin:0 auto 18px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:30px;padding:22px 18px;backdrop-filter:blur(14px)}
    .btn{border-radius:999px;padding:14px 22px;font-size:15px;font-weight:900;border:none;cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}
    .btnGhost{background:rgba(255,255,255,.07);border:1px solid var(--line)}

    .statsGrid{width:min(720px,100%);margin:0 auto 18px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .stat{background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:20px;padding:12px 10px}
    .stat b{display:block;font-size:18px}.stat span{display:block;color:var(--muted);font-size:12px}

    .chatShell{width:min(470px,calc(100% - 12px));position:fixed;left:50%;transform:translateX(-50%);bottom:12px;background:var(--panel);border:1px solid var(--line);border-radius:30px;overflow:hidden;display:none;z-index:1000}
    .chatShell.open{display:block}
    .chatHeader{padding:14px;background:var(--panel2);border-bottom:1px solid var(--line)}
    
    .messages{height:390px;overflow-y:auto;background:#000;padding:12px;text-align:right}
    .msg{max-width:86%;margin:8px 0;border-radius:24px;padding:10px 14px;font-size:14px;animation:fadeIn .18s ease}
    .msg.user{margin-right:auto;background:var(--user);border-bottom-right-radius:8px}
    .msg.bot{margin-left:auto;background:var(--bot);border-bottom-left-radius:8px}

    .inputArea{display:flex;gap:8px;padding:12px;background:rgba(20,21,25,.96)}
    .inputArea input{flex:1;border:none;border-radius:18px;background:var(--bubble);color:#fff;padding:12px 14px}
    .miniBtn{background:rgba(255,255,255,.08);border:none;border-radius:999px;padding:8px 11px;font-size:12px;color:#fff;cursor:pointer}

    @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    @media (max-width:760px){.statsGrid{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body class="theme-blue">
  <div class="page">
    <section class="hero">
      <h1>Bella Pro 🇰🇼</h1>
      <p>بوت سوالف كويتي ذكي</p>
      <div class="heroActions">
        <button class="btn" onclick="openChat()">افتح المحادثة 💬</button>
      </div>
    </section>

    <section class="statsGrid">
      <div class="stat"><b id="heroLevel">LVL 1</b><span>مستواك</span></div>
      <div class="stat"><b id="heroRank">مبتدئ</b><span>رتبتك</span></div>
      <div class="stat"><b id="heroStreak">0</b><span>الأيام</span></div>
      <div class="stat"><b id="heroXP">0 XP</b><span>نقاطك</span></div>
    </section>
  </div>

  <div class="chatShell" id="chatShell">
    <div class="chatHeader">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <b>Bella Pro</b>
        <button class="miniBtn" onclick="closeChat()">✕ إغلاق</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="inputArea">
      <input id="msgInput" type="text" placeholder="اكتب شي..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button class="btn" style="padding:8px 15px" onclick="sendMessage()">إرسال</button>
    </div>
  </div>

  <script>
    const state = { xp: 0, msgs: 0, streak: 1 };

    function openChat() { document.getElementById('chatShell').style.display = 'block'; }
    function closeChat() { document.getElementById('chatShell').style.display = 'none'; }

    function sendMessage() {
      const inp = document.getElementById('msgInput');
      const text = inp.value.trim();
      if (!text) return;

      addMessage('user', text);
      inp.value = '';
      
      state.xp += 5;
      state.msgs += 1;
      updateStats();

      // رد البوت التلقائي
      setTimeout(() => {
        const reply = "هلا والله، آمرني شنو بخاطرك؟";
        addMessage('bot', reply);
      }, 500);
    }

    function addMessage(type, text) {
      const box = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg ' + type;
      div.textContent = text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function updateStats() {
      const lvl = Math.floor(state.xp / 25) + 1;
      document.getElementById('heroLevel').textContent = "LVL " + lvl;
      document.getElementById('heroXP').textContent = state.xp + " XP";
      if(state.xp > 50) document.getElementById('heroRank').textContent = "متفاعل";
    }
  </script>
</body>
</html>
