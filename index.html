<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Faisal Site</title>

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
      padding-top: 50px;
    }

    h1 {
      color: #00ffcc;
    }

    .box {
      background: #1a1a1a;
      margin: auto;
      padding: 20px;
      width: 320px;
      border-radius: 15px;
      box-shadow: 0 0 20px #00ffcc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #00ffcc;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    #title {
      margin-top: 20px;
      font-size: 20px;
      color: #00ffcc;
    }

    img {
      margin-top: 10px;
      width: 280px;
      border-radius: 15px;
      display: none;
    }
  </style>
</head>

<body>

  <h1>🔥 اختر 🔥</h1>

  <div class="box">
    <button onclick="showFord()">فيصل</button>
    <button onclick="showLexus()">ثامر</button>

    <div id="title"></div>
    <img id="image" src="">
  </div>

  <script>
    function showFord() {
      document.getElementById("title").innerText = "ساطي";
      document.getElementById("image").src = "0EFEB962-15E1-45E0-92F1-24455A40DDED.png";
      document.getElementById("image").style.display = "block";
    }

    function showLexus() {
      document.getElementById("title").innerText = "لقى";
      document.getElementById("image").src = "IMG_4228.jpeg";
      document.getElementById("image").style.display = "block";
    }
  </script>

</body>
</html>
