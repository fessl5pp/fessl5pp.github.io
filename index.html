<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bella Ultra Pro</title>
  <meta name="description" content="بوت كويتي ذكي - نسخة مطورة">

  <!-- تحسين الشكل -->
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">

  <!-- Open Graph -->
  <meta property="og:title" content="Bella Ultra Pro">
  <meta property="og:description" content="بوت كويتي ذكي">
  <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">
  <meta property="og:type" content="website">

  <!-- ربط CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="theme-blue">

<div class="wrap">

  <!-- الشريط العلوي -->
  <div class="top-island">
    <div class="mini"><b id="xp-val">0</b><span>XP</span></div>
    <div class="mini"><b id="lvl-val">1</b><span>Level</span></div>
    <div class="mini"><b id="rank-val">مبتدئ</b><span>الرتبة</span></div>
    <div class="mini"><b id="streak-val">0</b><span>Streak</span></div>
    <div class="mood-pill" id="mood-pill">🤖 أوتو</div>
  </div>

  <!-- الهيرو -->
  <section class="hero">
    <div class="hero-top">
      <div class="logo">B</div>
      <div class="txt">
        <b>Bella Ultra Pro</b>
        <span>نسخة مطورة أقوى وأسرع</span>
      </div>
    </div>

    <h1>بوت كويتي ذكي 🔥</h1>
    <div class="sub">
      تجربة شات متطورة مع ذاكرة، مزاج، وثيمات.
    </div>

    <div class="hero-actions">
      <button class="btn" onclick="openChat()">ابدأ الحين ⚡</button>
      <button class="ghost" onclick="showTheme()">الثيم 🎨</button>
    </div>
  </section>

  <!-- الأوسمة -->
  <section class="badges-wrap">
    <div class="badges-head">
      <b>الأوسمة</b>
      <span id="ach-count">0 / 4</span>
    </div>

    <div class="badges">
      <div class="badge" id="b1">🌱 بداية</div>
      <div class="badge" id="b2">💬 سوالف</div>
      <div class="badge" id="b3">📍 مستكشف</div>
      <div class="badge" id="b4">☕ مزاج</div>
    </div>
  </section>

</div>

<!-- نافذة الشات -->
<div class="chat-win" id="win">

  <div class="header">
    <div class="left">
      <div class="avatar">B</div>
      <div class="title">
        <b>Bella</b>
        <span>جاهزة</span>
      </div>
    </div>

    <button class="tiny" onclick="closeChat()">✕</button>
  </div>

  <div class="msg-box" id="box"></div>

  <div class="input-area">
    <input id="inp" placeholder="اكتب..." 
      onkeydown="if(event.key==='Enter') send()">
    <button class="send" onclick="send()">إرسال</button>
  </div>

</div>

<!-- اختيار الثيم -->
<div class="modal hidden" id="themeModal">
  <div class="card">
    <h2>الثيم</h2>

    <div class="theme-box">
      <div class="theme-swatch sw1" onclick="setTheme('theme-blue')"></div>
      <div class="theme-swatch sw2" onclick="setTheme('theme-pink')"></div>
      <div class="theme-swatch sw3" onclick="setTheme('theme-gold')"></div>
    </div>

    <button class="ghost" onclick="hideTheme()">إغلاق</button>
  </div>
</div>

<!-- ربط JS -->
<script src="/api/chat.js"></script>

</body>
</html>
