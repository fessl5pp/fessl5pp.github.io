<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أهلاً بكم بموقع فيصل</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg1: #0b0b0d;
      --bg2: #16171c;
      --panel: rgba(25, 25, 28, 0.96);
      --panel2: rgba(38, 38, 42, 0.95);
      --user: #0a84ff;
      --bot: #2c2c2e;
      --text: #fff;
      --muted: #b6b6c2;
      --accent1: #0a84ff;
      --accent2: #5e5ce6;
      --accent3: #ff2d55;
      --gold: #ffcc00;
      --green: #34c759;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(94,92,230,0.18), transparent 25%),
        radial-gradient(circle at bottom, rgba(10,132,255,0.12), transparent 25%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      text-align: center;
      padding: 42px 14px 130px;
    }

    h1 {
      margin: 0;
      font-size: 31px;
      font-weight: 900;
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    #openBtn {
      margin-top: 24px;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(10,132,255,0.28);
    }

    #chatBox {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 14px;
      width: min(410px, calc(100% - 16px));
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
      overflow: hidden;
      display: none;
      box-shadow: 0 24px 50px rgba(0,0,0,0.42);
      z-index: 999;
      backdrop-filter: blur(16px);
    }

    #chatHeader {
      padding: 14px;
      background: rgba(36,36,40,0.92);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .headerTop {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    #botInfo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff7eb3, #7afcff);
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 18px;
    }

    #botName {
      text-align: right;
    }

    #botName b {
      display: block;
      font-size: 15px;
    }

    #botName span {
      font-size: 12px;
      color: #d0d0d6;
    }

    .topBtns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .topBtn {
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: white;
      padding: 8px 11px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .statsBar {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: space-between;
    }

    .statChip {
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      color: #e5e7eb;
      font-weight: 700;
    }

    #moodBar, #quickBar, #toolsBar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 12px;
      scrollbar-width: none;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    #moodBar::-webkit-scrollbar,
    #quickBar::-webkit-scrollbar,
    #toolsBar::-webkit-scrollbar {
      display: none;
    }

    .moodBtn, .quickBtn, .toolBtn {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 800;
      color: white;
      background: #2c2c2e;
    }

    .activeMood {
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
    }

    #messages {
      height: 360px;
      overflow-y: auto;
      background: #000;
      padding: 12px;
      text-align: right;
      scroll-behavior: smooth;
    }

    .msg {
      width: fit-content;
      max-width: 82%;
      margin: 8px 0;
      padding: 10px 14px;
      border-radius: 22px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
      animation: fadeIn 0.18s ease;
    }

    .user {
      margin-right: auto;
      background: var(--user);
      color: white;
      border-bottom-right-radius: 8px;
    }

    .bot {
      margin-left: auto;
      background: var(--bot);
      color: white;
      border-bottom-left-radius: 8px;
    }

    .system {
      margin: 10px auto;
      background: rgba(255,255,255,0.08);
      color: #ddd;
      font-size: 12px;
      border-radius: 999px;
      padding: 8px 12px;
      max-width: 90%;
    }

    .typing {
      opacity: 0.8;
      font-style: italic;
    }

    .bot img {
      width: 100%;
      border-radius: 14px;
      margin-top: 8px;
      display: block;
    }

    .choiceWrap {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .choiceBtn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
    }

    .choiceMain {
      background: var(--accent1);
      color: white;
    }

    .choiceDark {
      background: #3a3a3c;
      color: white;
    }

    #chatInputArea {
      display: flex;
      gap: 8px;
      padding: 12px;
      background: rgba(22,22,24,0.96);
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    #msg {
      flex: 1;
      border: none;
      outline: none;
      border-radius: 18px;
      background: #1c1c1e;
      color: white;
      padding: 12px 14px;
      font-size: 14px;
    }

    #msg::placeholder {
      color: #9a9aa1;
    }

    #sendBtn {
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: white;
      padding: 12px 14px;
      font-weight: 800;
      cursor: pointer;
      min-width: 58px;
    }

    #genderBox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 20px;
    }

    #genderCard {
      width: min(370px, 100%);
      background: #17181d;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 22px 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    #genderCard h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    #genderCard p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .genderBtn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      margin-top: 10px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      color: white;
    }

    .maleBtn {
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
    }

    .femaleBtn {
      background: linear-gradient(135deg, var(--accent3), #ff7eb3);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 420px) {
      #messages { height: 325px; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>

  <h1>أهلاً بكم بموقع فيصل</h1>
  <div class="sub">Bella النسخة المطوّرة بالكامل 😎</div>
  <button id="openBtn" onclick="toggleChat()">افتح Bella 💬</button>

  <div id="genderBox">
    <div id="genderCard">
      <h2>شلون تبين/تبي Bella تكلمج/ك؟</h2>
      <p>اختاري/اختر الصيغة من البداية</p>
      <button class="genderBtn maleBtn" onclick="setGender('male')">👨 كلّميني بصيغة ذكر</button>
      <button class="genderBtn femaleBtn" onclick="setGender('female')">👩 كلّميني بصيغة أنثى</button>
    </div>
  </div>

  <div id="chatBox">
    <div id="chatHeader">
      <div class="headerTop">
        <div id="botInfo">
          <div id="avatar">B</div>
          <div id="botName">
            <b>Bella 💕</b>
            <span id="statusText">موجودة</span>
          </div>
        </div>

        <div class="topBtns">
          <button class="topBtn" onclick="clearChat()">مسح</button>
          <button class="topBtn" onclick="resetAll()">إعادة</button>
          <button class="topBtn" onclick="toggleChat()">✕</button>
        </div>
      </div>

      <div class="statsBar">
        <div class="statChip" id="nameChip">الاسم: غير معروف</div>
        <div class="statChip" id="pointsChip">النقاط: 0</div>
        <div class="statChip" id="rankChip">الرتبة: مبتدئ</div>
      </div>
    </div>

    <div id="moodBar">
      <button id="moodCute" class="moodBtn activeMood" onclick="setMood('cute')">💕 دلع</button>
      <button id="moodFun" class="moodBtn" onclick="setMood('fun')">😎 فلة</button>
      <button id="moodCalm" class="moodBtn" onclick="setMood('calm')">🤍 رايق</button>
      <button id="moodMad" class="moodBtn" onclick="setMood('mad')">😒 معصبة</button>
    </div>

    <div id="toolsBar">
      <button class="toolBtn" onclick="showSuggestions()">اقتراحات</button>
      <button class="toolBtn" onclick="quickSend('اسمي فيصل')">حفظ اسم</button>
      <button class="toolBtn" onclick="quickSend('منو انا')">منو أنا</button>
      <button class="toolBtn" onclick="quickSend('رتبتي')">رتبتي</button>
      <button class="toolBtn" onclick="quickSend('نقاطي')">نقاطي</button>
    </div>

    <div id="quickBar">
      <button class="quickBtn" onclick="quickSend('هلا')">هلا</button>
      <button class="quickBtn" onclick="quickSend('نور')">نور</button>
      <button class="quickBtn" onclick="quickSend('ثامر')">ثامر</button>
      <button class="quickBtn" onclick="quickSend('احبك')">احبك</button>
      <button class="quickBtn" onclick="quickSend('شلونك')">شلونك</button>
      <button class="quickBtn" onclick="quickSend('طفشان')">طفشان</button>
      <button class="quickBtn" onclick="quickSend('زوط')">زوط</button>
      <button class="quickBtn" onclick="quickSend('زربه')">زربه</button>
      <button class="quickBtn" onclick="quickSend('انمحنت')">انمحنت</button>
      <button class="quickBtn" onclick="quickSend('نكت لكزس')">نكت لكزس</button>
      <button class="quickBtn" onclick="quickSend('تزوجيني')">تزوجيني</button>
      <button class="quickBtn" onclick="quickSend('احب اللكزس')">احب اللكزس</button>
    </div>

    <div id="messages"></div>

    <div id="chatInputArea">
      <input id="msg" type="text" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button id="sendBtn" onclick="sendMessage()">إرسال</button>
    </div>
  </div>

  <script>
    let bellaMood = "cute";
    let userGender = "male";
    let userName = "";
    let userPoints = 0;

    const messages = document.getElementById("messages");
    const statusText = document.getElementById("statusText");
    const nameChip = document.getElementById("nameChip");
    const pointsChip = document.getElementById("pointsChip");
    const rankChip = document.getElementById("rankChip");

    function toggleChat() {
      const chatBox = document.getElementById("chatBox");
      chatBox.style.display = chatBox.style.display === "block" ? "none" : "block";
    }

    function setStatus(text) {
      statusText.innerText = text;
    }

    function setGender(g) {
      userGender = g;
      localStorage.setItem("bella_gender", g);
      document.getElementById("genderBox").style.display = "none";
      updateStats();
      if (messages.innerHTML.trim() === "") {
        addMessage(getWelcomeMessage(), "bot", true);
      }
    }

    function setMood(mood) {
      bellaMood = mood;
      localStorage.setItem("bella_mood", mood);

      document.getElementById("moodCute").classList.remove("activeMood");
      document.getElementById("moodFun").classList.remove("activeMood");
      document.getElementById("moodCalm").classList.remove("activeMood");
      document.getElementById("moodMad").classList.remove("activeMood");

      if (mood === "cute") document.getElementById("moodCute").classList.add("activeMood");
      if (mood === "fun") document.getElementById("moodFun").classList.add("activeMood");
      if (mood === "calm") document.getElementById("moodCalm").classList.add("activeMood");
      if (mood === "mad") document.getElementById("moodMad").classList.add("activeMood");
    }

    function addPoints(n) {
      userPoints += n;
      localStorage.setItem("bella_points", userPoints);
      updateStats();
    }

    function getRank() {
      if (userPoints >= 80) return "👑 ملك السوالف";
      if (userPoints >= 50) return "🔥 خبير سوالف";
      if (userPoints >= 25) return "😎 نشيط";
      if (userPoints >= 10) return "🙂 متفاعل";
      return "🌱 مبتدئ";
    }

    function updateStats() {
      nameChip.innerText = "الاسم: " + (userName || "غير معروف");
      pointsChip.innerText = "النقاط: " + userPoints;
      rankChip.innerText = "الرتبة: " + getRank();
    }

    function saveName(name) {
      userName = name;
      localStorage.setItem("bella_name", name);
      updateStats();
    }

    function addMessage(text, type, skipSave = false) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.innerText = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;

      if (!skipSave) saveChatItem({ kind: "text", type, text });
    }

    function addSystem(text) {
      const div = document.createElement("div");
      div.className = "system";
      div.innerText = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function addTyping() {
      setStatus("تكتب...");
      const div = document.createElement("div");
      div.className = "msg bot typing";
      div.id = "typingBox";
      div.innerText = "Bella تكتب...";
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      const box = document.getElementById("typingBox");
      if (box) box.remove();
      setStatus("موجودة");
    }

    function addImageMessage(src, skipSave = false) {
      const div = document.createElement("div");
      div.className = "msg bot";

      const txt = document.createElement("div");
      txt.innerText = "راعي الهرش ولا اللكزس؟ 😏";

      const img = document.createElement("img");
      img.src = src;
      img.alt = "Lexus";

      const wrap = document.createElement("div");
      wrap.className = "choiceWrap";
      wrap.innerHTML = `
        <button class="choiceBtn choiceMain" onclick="chooseOption('اللكزس')">اللكزس</button>
        <button class="choiceBtn choiceDark" onclick="chooseOption('الهرش')">الهرش</button>
        <button class="choiceBtn choiceDark" onclick="quickSend('نكت لكزس')">نكت لكزس</button>
      `;

      div.appendChild(txt);
      div.appendChild(img);
      div.appendChild(wrap);

      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;

      if (!skipSave) saveChatItem({ kind: "thamer_image", src });
    }

    function chooseOption(choice) {
      addMessage(choice, "user");
      addPoints(2);

      let reply = "";
      if (choice === "اللكزس") {
        reply = moodReply(
          "اختيارك فخم فخامة اللكزس 🔥",
          "أيييه جذي الذوق ولا بلاش 😎",
          "اختيار مرتب وحلو 🤍",
          "إي زين اخترت شي عدل 😒"
        );
      } else {
        reply = moodReply(
          "ههههه واضح إنك راعي هرش 😏",
          "مت ضحك، اختيارك يفشل بس يونس 😂",
          "على راحتك 🤍",
          "إيه بس لا تعيدها 😒"
        );
      }

      addTyping();
      setTimeout(() => {
        removeTyping();
        addMessage(reply, "bot");
      }, 280);
    }

    function showSuggestions() {
      addSystem("اقتراحات: قل اسمي ... | قل نور | قل ثامر | قل نكت لكزس | قل تزوجيني | قل نقاطي | قل رتبتي");
    }

    function quickSend(text) {
      document.getElementById("msg").value = text;
      sendMessage();
    }

    function normalizeArabic(text) {
      return text
        .replace(/[أإآ]/g, "ا")
        .replace(/ة/g, "ه")
        .replace(/ى/g, "ي")
        .replace(/ؤ/g, "و")
        .replace(/ئ/g, "ي")
        .replace(/گ/g, "ك")
        .replace(/چ/g, "ج")
        .replace(/ـ/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }

    function includesAny(msg, arr) {
      return arr.some(word => msg.includes(word));
    }

    function getRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function moodReply(cute, fun, calm, mad) {
      if (bellaMood === "cute") return cute;
      if (bellaMood === "fun") return fun;
      if (bellaMood === "calm") return calm;
      return mad;
    }

    function himOrHer(maleText, femaleText) {
      return userGender === "female" ? femaleText : maleText;
    }

    function extractName(msg) {
      const patterns = ["اسمي ", "انا ", "أنا "];
      for (let p of patterns) {
        const i = msg.indexOf(p);
        if (i !== -1) {
          const val = msg.slice(i + p.length).trim();
          if (val.length > 0 && val.length < 25) return val;
        }
      }
      return "";
    }

    function getBotReply(text) {
      const raw = text.trim();
      const msg = normalizeArabic(raw);

      const maybeName = extractName(raw);
      if (msg.startsWith("اسمي ") && maybeName) {
        saveName(maybeName);
        return moodReply(
          "تم يا " + maybeName + "، حفظت اسمك عندي 💕",
          "خلاص " + maybeName + "، انحفظ الاسم 😎",
          "تم حفظ الاسم: " + maybeName + " 🤍",
          "زين، حفظت اسمك " + maybeName + " 😒"
        );
      }

      if (includesAny(msg, ["منو انا", "من انا"])) {
        if (userName) return "إنت " + userName + "، لا تسوي نفسك ناسي 😏";
        return himOrHer("إنت للحين ما قلت شسمك", "إنتي للحين ما قلتي شسمج");
      }

      if (includesAny(msg, ["نقاطي", "كم نقاطي"])) {
        return "نقاطك الحين: " + userPoints + " 🔥";
      }

      if (includesAny(msg, ["رتبتي", "وش رتبتي", "شنو رتبتي"])) {
        return "رتبتك الحين: " + getRank();
      }

      if (msg.includes("نور")) {
        return "نور دنيايييي هوايييي ومايييي 🤍";
      }

      if (msg.includes("ثامر")) {
        return "__THAMER_SPECIAL__";
      }

      if (includesAny(msg, ["نكت لكزس", "نكت عن اللكزس"])) {
        return getRandom([
          "واحد اشترى لكزس… صار يمشي بطيء عشان الناس تشوفه 🤣🔥",
          "واحد سألوه: تحب اللكزس ليش؟ قال: عشان ما يحتاج أشرح… هي تشرح عني 😏😂",
          "واحد قال لخويه: عندي لكزس قاله: الله يبارك قال: لا، بارك لنفسك لأني بوصلك 😂",
          "واحد سألوه: وش الفرق بيني وبين اللكزس؟ قال: اللكزس فيها هيبة… وأنت تحاول 😂"
        ]);
      }

      if (includesAny(msg, ["زوط"])) {
        return "دخل فيك مزبوط 😏";
      }

      if (includesAny(msg, ["زربه"])) {
        return "عليك يا حمار 😂";
      }

      if (includesAny(msg, ["انمحنت", "انحرجت", "احرجت", "تورطت"])) {
        return "ويللل أمها يا قحطاني 😂🔥";
      }

      if (includesAny(msg, ["تزوجيني", "تتزوجيني"])) {
        return "تخسي أنا زوجة فيصل 😌";
      }

      if (includesAny(msg, ["هلا", "مرحبا", "السلام", "هلو"])) {
        return moodReply(
          "هلا والله " + (userName ? userName : himOrHer("يا بعد قلبي", "يا بعد عمري")) + " 💕",
          "هلااا وغلااا 😎",
          "هلا والله 🤍",
          "هلا، شتبي؟ 😒"
        );
      }

      if (includesAny(msg, ["شلونك", "كيفك", "خبارك"])) {
        return moodReply(
          "بخير دامك موجود " + (userName ? userName : "") + " 🤍",
          "تمام دام السوالف موجودة 😎",
          "الحمدلله، " + himOrHer("إنت شلونك؟", "إنتي شلونج؟"),
          "زينه، لا تطول/ين علي 😒"
        );
      }

      if (includesAny(msg, ["اسمك", "منو انتي", "من انتي", "انتي مين"])) {
        return moodReply(

    function sendMessage() {
      const input = document.getElementById("msg");
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      addPoints(1);
      input.value = "";

      const reply = getBotReply(text);

      addTyping();
      setTimeout(() => {
        removeTyping();

        if (reply === "__THAMER_SPECIAL__") {
          addImageMessage("IMG_4228.jpeg");
          addPoints(2);
        } else {
          addMessage(reply, "bot");
        }
      }, 260);
    }

    function saveChatItem(item) {
      const old = JSON.parse(localStorage.getItem("bella_chat") || "[]");
      old.push(item);
      localStorage.setItem("bella_chat", JSON.stringify(old));
    }

    function loadChat() {
      const savedGender = localStorage.getItem("bella_gender");
      if (savedGender) {
        userGender = savedGender;
        document.getElementById("genderBox").style.display = "none";
      }

      const savedMood = localStorage.getItem("bella_mood");
      if (savedMood) setMood(savedMood);

      const savedName = localStorage.getItem("bella_name");
      if (savedName) userName = savedName;

      const savedPoints = parseInt(localStorage.getItem("bella_points") || "0", 10);
      userPoints = isNaN(savedPoints) ? 0 : savedPoints;

      updateStats();

      const old = JSON.parse(localStorage.getItem("bella_chat") || "[]");
      if (old.length === 0) {
        addMessage(getWelcomeMessage(), "bot", true);
        return;
      }

      old.forEach(item => {
        if (item.kind === "text") {
          addMessage(item.text, item.type, true);
        } else if (item.kind === "thamer_image") {
          addImageMessage(item.src, true);
        }
      });
    }

    function clearChat() {
      localStorage.removeItem("bella_chat");
      messages.innerHTML = "";
      addMessage(getWelcomeMessage(), "bot", true);
    }

    function resetAll() {
      localStorage.removeItem("bella_chat");
      localStorage.removeItem("bella_name");
      localStorage.removeItem("bella_points");
      localStorage.removeItem("bella_mood");
      localStorage.removeItem("bella_gender");
      userName = "";
      userPoints = 0;
      bellaMood = "cute";
      userGender = "male";
      updateStats();
      messages.innerHTML = "";
      document.getElementById("genderBox").style.display = "flex";
      setMood("cute");
    }

    function getWelcomeMessage() {
      const hour = new Date().getHours();
      const namePart = userName ? " " + userName : "";

      if (hour < 12) return userGender === "female" ? "صباح الخير" + namePart + " يا قلبي 💕" : "صباح الخير" + namePart + " يا حلو 🤍";
      if (hour < 18) return userGender === "female" ? "ياهلا والله" + namePart + "، شلونج؟ 💕" : "ياهلا والله" + namePart + "، شلونك؟ 🤍";
      return userGender === "female" ? "مساء الخير" + namePart + " يا بعد عمري 💕" : "مساء الخير" + namePart + " يا بعد قلبي 🤍";
    }
