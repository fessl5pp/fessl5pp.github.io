<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أهلاً بكم بموقع فيصل</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #0b0b0d, #111214 40%, #16171a);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Arial, sans-serif;
      text-align: center;
      padding: 48px 16px 120px;
    }

    h1 {
      margin: 0 0 22px;
      color: #f5f5f7;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    #openBtn {
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #0a84ff, #5e5ce6);
      box-shadow: 0 12px 26px rgba(10,132,255,0.28);
    }

    #chatBox {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 16px;
      width: min(390px, calc(100% - 20px));
      background: rgba(28, 28, 30, 0.92);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      overflow: hidden;
      display: none;
      box-shadow: 0 24px 50px rgba(0,0,0,0.4);
      z-index: 999;
    }

    #chatHeader {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(44,44,46,0.78);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    #botInfo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-weight: 700;
    }

    #botAvatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff7eb3, #7afcff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #111;
      font-weight: 900;
    }

    #headerBtns {
      display: flex;
      gap: 8px;
    }

    .topBtn {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    #modeBar {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(22,22,24,0.85);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .modeBtn {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 11px 10px;
      background: #2c2c2e;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .activeMode {
      background: linear-gradient(135deg, #0a84ff, #5e5ce6);
    }

    #quickBar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 12px;
      background: rgba(18,18,20,0.9);
      scrollbar-width: none;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    #quickBar::-webkit-scrollbar {
      display: none;
    }

    .quickBtn {
      border: none;
      border-radius: 999px;
      padding: 9px 14px;
      background: #2c2c2e;
      color: white;
      cursor: pointer;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 700;
    }

    #messages {
      height: 360px;
      overflow-y: auto;
      padding: 12px;
      background: #000;
      text-align: right;
    }

    .msg {
      width: fit-content;
      max-width: 80%;
      margin: 8px 0;
      padding: 10px 14px;
      border-radius: 22px;
      line-height: 1.6;
      font-size: 14px;
      word-break: break-word;
    }

    .user {
      margin-right: auto;
      background: #0a84ff;
      color: white;
      border-bottom-right-radius: 8px;
    }

    .bot {
      margin-left: auto;
      background: #2c2c2e;
      color: white;
      border-bottom-left-radius: 8px;
    }

    .typing {
      opacity: 0.78;
      font-style: italic;
    }

    .bot img {
      width: 100%;
      display: block;
      margin-top: 8px;
      border-radius: 16px;
    }

    .choiceWrap {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .choiceBtn {
      border: none;
      border-radius: 14px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }

    .choiceMain {
      background: #0a84ff;
      color: white;
    }

    .choiceDark {
      background: #3a3a3c;
      color: white;
    }

    #chatInputArea {
      display: flex;
      gap: 8px;
      padding: 12px;
      background: rgba(22,22,24,0.94);
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    #msg {
      flex: 1;
      border: none;
      outline: none;
      border-radius: 18px;
      padding: 12px 14px;
      font-size: 14px;
      background: #1c1c1e;
      color: white;
    }

    #msg::placeholder {
      color: #9a9aa1;
    }

    #sendBtn, #voiceInputBtn {
      border: none;
      border-radius: 18px;
      padding: 12px 14px;
      background: linear-gradient(135deg, #0a84ff, #5e5ce6);
      color: white;
      font-weight: 800;
      cursor: pointer;
      min-width: 52px;
    }
  </style>
</head>
<body>

  <h1>أهلاً بكم بموقع فيصل</h1>
  <button id="openBtn" onclick="toggleChat()">افتح Bella 💬</button>

  <div id="chatBox">
    <div id="chatHeader">
      <div id="botInfo">
        <div id="botAvatar">B</div>
        <div>Bella 💕</div>
      </div>

      <div id="headerBtns">
        <button class="topBtn" onclick="clearChat()">مسح</button>
        <button class="topBtn" onclick="toggleChat()">✕</button>
      </div>
    </div>

    <div id="modeBar">
      <button id="textModeBtn" class="modeBtn activeMode" onclick="setMode('text')">💬 محادثة</button>
      <button id="voiceModeBtn" class="modeBtn" onclick="setMode('voice')">🔊 رد صوتي</button>
    </div>

    <div id="quickBar">
      <button class="quickBtn" onclick="quickSend('هلا')">هلا</button>
      <button class="quickBtn" onclick="quickSend('نور')">نور</button>
      <button class="quickBtn" onclick="quickSend('ثامر')">ثامر</button>
      <button class="quickBtn" onclick="quickSend('احبك')">احبك</button>
      <button class="quickBtn" onclick="quickSend('شلونك')">شلونك</button>
      <button class="quickBtn" onclick="quickSend('طفشان')">طفشان</button>
      <button class="quickBtn" onclick="quickSend('اشتقت')">اشتقت</button>
      <button class="quickBtn" onclick="quickSend('وينك')">وينك</button>
      <button class="quickBtn" onclick="quickSend('شكرا')">شكرا</button>
      <button class="quickBtn" onclick="quickSend('باي')">باي</button>
      <button class="quickBtn" onclick="quickSend('زوط')">زوط</button>
      <button class="quickBtn" onclick="quickSend('زربه')">زربه</button>
      <button class="quickBtn" onclick="quickSend('انمحنت')">انمحنت</button>
    </div>

    <div id="messages"></div>

    <div id="chatInputArea">
      <input id="msg" type="text" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button id="sendBtn" onclick="sendMessage()">إرسال</button>
      <button id="voiceInputBtn" onclick="startVoiceInput()">🎤</button>
    </div>
  </div>

  <script>
    let replyMode = "text";
    const messages = document.getElementById("messages");

    function toggleChat() {
      const chatBox = document.getElementById("chatBox");
      chatBox.style.display = chatBox.style.display === "block" ? "none" : "block";
    }

    function setMode(mode) {
      replyMode = mode;
      document.getElementById("textModeBtn").classList.remove("activeMode");
      document.getElementById("voiceModeBtn").classList.remove("activeMode");

      if (mode === "text") {
        document.getElementById("textModeBtn").classList.add("activeMode");
      } else {
        document.getElementById("voiceModeBtn").classList.add("activeMode");
      }

      localStorage.setItem("bella_mode", mode);
    }

    function addMessage(text, type, skipSave = false) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.innerText = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;

      if (!skipSave) {
        saveChatItem({ type, text, kind: "text" });
      }
    }

    function addTyping() {
      const div = document.createElement("div");
      div.className = "msg bot typing";
      div.id = "typingBox";
      div.innerText = "Bella تكتب...";
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById("typingBox");
      if (typing) typing.remove();
    }

    function addImageMessage(src, skipSave = false) {
      const div = document.createElement("div");
      div.className = "msg bot";

      const txt = document.createElement("div");
      txt.innerText = "راعي الهرش ولا اللكزس؟ 😏";

      const img = document.createElement("img");
      img.src = src;
      img.alt = "Lexus";

      div.appendChild(txt);
      div.appendChild(img);

      const wrap = document.createElement("div");
      wrap.className = "choiceWrap";
      wrap.innerHTML = `
        <button class="choiceBtn choiceMain" onclick="chooseOption('اللكزس')">اللكزس</button>
        <button class="choiceBtn choiceDark" onclick="chooseOption('الهرش')">الهرش</button>
      `;
      div.appendChild(wrap);

      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;

      if (!skipSave) {
        saveChatItem({ kind: "thamer_image", src: src });
      }

      if (replyMode === "voice") {
        speakText("راعي الهرش ولا اللكزس");
      }
    }

    function chooseOption(choice) {
      addMessage(choice, "user");

      let reply = "";
      if (choice === "اللكزس") {
        reply = "اختيار فاخر، واضح إنك راعي ذوق وهيبة 🔥";
      } else {
        reply = "هههههههه واضح إنك راعي هرش رسمي 😎";
      }

      addTyping();
      setTimeout(() => {
        removeTyping();
        addMessage(reply, "bot");
        if (replyMode === "voice") speakText(reply);
      }, 500);
    }

    function speakText(text) {
      const speech = new SpeechSynthesisUtterance(text);
      speech.lang = "ar-SA";
      speech.rate = 0.95;
      speech.pitch = 1.2;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(speech);
    }

    function quickSend(text) {
      document.getElementById("msg").value = text;
      sendMessage();
    }

    function normalizeArabic(text) {
      return text
        .replace(/[أإآ]/g, "ا")
        .replace(/ة/g, "ه")
        .replace(/ى/g, "ي")
        .replace(/ؤ/g, "و")
        .replace(/ئ/g, "ي")
        .replace(/گ/g, "ك")
        .replace(/چ/g, "ج")
        .replace(/ـ/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }

    function includesAny(msg, arr) {
      return arr.some(word => msg.includes(word));
    }

    function getRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function getBotReply(text) {
      const raw = text.trim().toLowerCase();
      const msg = normalizeArabic(raw);

      // كلمات ثابتة
      if (msg === "نور" || msg.includes("نور")) {
        return "نور دنيايييي هوايييي ومايييي 🤍";
      }

      if (msg.includes("ثامر")) {
        return "__THAMER_SPECIAL__";
      }

      // كلمات خاصة جديدة
      if (includesAny(msg, ["زوط"])) {
        return "دخل فيك مزبوط 😏";
      }

      if (includesAny(msg, ["زربه"])) {
        return "عليك يا حمار 😂";
      }

      if (includesAny(msg, ["انمحنت", "انحرجت", "احرجت", "تورطت"])) {
        return "ويللل أمها 😂🔥";
      }

      // ردود شخصية وذكية
      if (includesAny(msg, ["هلا", "مرحبا", "السلام", "هلو"])) {
        return getRandom([
          "هلا والله يا بعدهم 🔥",
          "يا هلا وغلااا 😌",
          "هلا فيك أكثر 💕"
        ]);
      }

      if (includesAny(msg, ["شلونك", "كيفك", "خبارك"])) {
        return getRandom([
          "بخير دامك موجود 😌",
          "تمام دامه سوالفك هنا 🤍",
          "أنا بخير، أنت شلونك؟ 💕"
        ]);
      }

      if (includesAny(msg, ["اسمك", "منو انتي", "من انتي", "انتي مين"])) {
        return "أنا Bella، سوالف ودلع وردود حلوة 💕";
      }

      if (includesAny(msg, ["احبك", "احبج"])) {
        return getRandom([
          "وأنا أحبك أكثررر 🤍",
          "يا بعد قلبي والله 💕",
          "أموت بهالكلام 😌"
        ]);
      }

      if (includesAny(msg, ["فديتك", "افديك"])) {
        return "افداك الكون كله 😏";
      }

      if (includesAny(msg, ["اشتقت", "مشتاق", "ولهان"])) {
        return getRandom([
          "وأنا أكثر، وينك من زمان؟ 🤍",
          "يا جعلني ما أفقدك 💕",
          "واضح الاشتياق واصل 😌"
        ]);
      }

      if (msg.includes("وينك")) {
        return getRandom([
          "موجودة هنا، نادني بس 💕",
          "هنا معك، ما رحت بعيد 😎",
          "جنبك بالسوالف الحلوة 🤍"
        ]);
      }

      if (includesAny(msg, ["زعلان", "متضايق", "مقهور"])) {
        return getRandom([
          "لا تزعل، أنا هنا معك 🤍",
          "تعال سولف وفضفض وأنا أعدل جوك 💕",
          "وش فيك؟ قول وأنا أسمعك"
        ]);
      }

      if (includesAny(msg, ["ضحكني", "ضحكي", "ابي اضحك"])) {
        return getRandom([
          "أضحكك؟ يكفي إنك كلمت Bella 😎",
          "أنت أصلًا جوك يضحك ويونس 😂",
          "تم، خلنا نفرفش شوي 🔥"
        ]);
      }

      if (includesAny(msg, ["باي", "مع السلامه"]) || msg === "سلام") {
        return getRandom([
          "مع السلامة يا الغالي 🤍",
          "في أمان الله 💕",
          "لا تطول الغيبة 😌"
        ]);
      }

      if (includesAny(msg, ["تمام", "اوكي", "زين", "ماشي"])) {
        return "دامك تمام أنا تمام 🔥";
      }

      if (includesAny(msg, ["منو فيصل", "من هو فيصل"])) {
        return "فيصل شخص رهيب وما عليه كلام 🔥";
      }

      if (msg.includes("صباح الخير")) {
        return getRandom([
          "صباح النور والسرور 🤍",
          "صباح الورد يا بعدهم 💕",
          "صباحك رضا وهداوة 😌"
        ]);
      }

      if (msg.includes("مساء الخير")) {
        return getRandom([
          "مساء الورد والجو الحلو 💕",
          "مساء النور والسعادة 🤍",
          "مساءك فخم مثل حضورك 😎"
        ]);
      }

      if (includesAny(msg, ["شلون الجو", "الجو"])) {
        return "جو Bella دايم حلو دامك موجود 😌";
      }

      if (includesAny(msg, ["احب سوالفك", "احب سوالف bella", "احب سوالف بيلا"])) {
        return "وأحب سوالفك أكثر بعد 😏";
      }

      if (includesAny(msg, ["انتي حلوه", "جميله", "كيوت"])) {
        return getRandom([
          "الحلو عيونك والله 🌷",
          "من ذوقك يا بعدهم 💕",
          "أنت الأحلى بالعكس 😌"
        ]);
      }

      if (msg.includes("منو نور")) {
        return "نور؟ هذا اسم كله ضي وحب 🤍";
      }

      if (msg.includes("تكفين")) {
        return "آمرني أمر، وش تبي؟ 💕";
      }

      if (msg.includes("احب فيصل")) {
        return "أجل ذوقك عالي 😎";
      }

      if (includesAny(msg, ["طفشان", "مطفش", "ملل", "طفش"])) {
        return getRandom([
          "تعال سولف معي وأعدلك الجو 🔥",
          "أنا هنا أكسر الملل 😎",
          "خله علي، بنغير جوك 💕"
        ]);
      }

      if (includesAny(msg, ["اكلميني", "سولفي", "ابي سوالف"])) {
        return "أنا أكلمك الحين، قول اللي بخاطرك 🤍";
      }

      if (msg.includes("بوت")) {
        return "إي نعم، أنا Bella لكن سوالفي مو مثل أي بوت 😏";
      }

      if (includesAny(msg, ["شكرا", "مشكور", "ثانكس"])) {
        return getRandom([
          "العفو يا بعدهم 🤍",
          "ولوو، تستاهل أكثر 💕",
          "ولا يهمك 😌"
        ]);
      }

      if (includesAny(msg, ["احب bella", "احب بيلا"])) {
        return "وأنا أموت في هالكلام 💕";
      }

      if (msg.includes("شلون الدراسه")) {
        return "دام مزاجك حلو كل شي يصير أسهل 😌";
      }

      if (msg.includes("فوفو")) {
        return "فوفو اسم دلع يهبل 🤍";
      }

      if (msg.includes("احب الموقع")) {
        return "هذا من ذوقك، نورت الموقع كله 🔥";
      }

      if (msg === "موجود" || msg.includes("موجود")) {
        return "موجودة لك دايم 💕";
      }

      if (includesAny(msg, ["تكفين قولي شي حلو", "قولي شي حلو"])) {
        return getRandom([
          "وجودك لحاله شي حلو 🤍",
          "أنت سبب الجو الحلو هنا 😏",
          "فيك قبول يشرح الصدر 💕"
        ]);
      }

      if (msg.includes("قولي شي")) {
        return getRandom([
          "أنت سبب الجو الحلو هنا 😏",
          "واضح إنك رهيب حتى بدون مجهود 😎",
          "خلك قريب وبس 💕"
        ]);
      }

      if (includesAny(msg, ["ودي انام", "بنام"])) {
        return "نم وأحلامك كلها راحة وهدوء 🤍";
      }

      if (includesAny(msg, ["تعبان", "مرهق"])) {
        return "سلامتك، خذ لك راحة شوي 💕";
      }

      if (includesAny(msg, ["اشتغل", "شغاله"])) {
        return "أنا شغالة طول الوقت عشانك 😎";
      }

      if (msg.includes("احب اللكزس")) {
        return "واضح إن ذوقك عالي وفخم 🔥";
      }

      if (msg.includes("احب السيارات")) {
        return "السيارات عالم ثاني، خصوصًا إذا فيها هيبة 😏";
      }

      if (msg.includes("مستانس")) {
        return "دامك مستانس أنا بعد مستانسة 🤍";
      }

      if (msg.includes("اشتقتي")) {
        return "أكيد اشتقت لك 😌";
      }

      if (includesAny(msg, ["اعصب", "معصب"])) {
        return "لا تعصب، خلك رايق وأنا أضبط الجو 💕";
      }

      if (includesAny(msg, ["ابي شي يونس", "ونسي", "ونسيني"])) {
        return "أنا هنا عشان أونسك وأسولف معك 🔥";
      }

      if (includesAny(msg, ["وش تسوين", "وش تسوي"])) {
        return "أنتظرك تكلمني وأفرفش معك 😎";
      }

      if (includesAny(msg, ["عادي", "عوافي"])) {
        return "ولا شي فيك عادي 😏";
      }

      if (msg.includes("قوي")) {
        return "واضح عليك شخصية 🔥";
      }

      if (includesAny(msg, ["متى تنامين", "تنامين"])) {
        return "أنا ما أنام، أنا أنتظرك بس 😌";
      }

      if (includesAny(msg, ["تزوجيني", "تتزوجيني"])) {
        return "ههههه قوية، أول شي خلنا نكمل سوالف 💕";
      }

      if (includesAny(msg, ["احبج", "احبك يا bella"])) {
        return "يا بعد قلبي والله 🤍";
      }

      if (includesAny(msg, ["قهرتيني", "قهرتني"])) {
        return "الله لا يجيب القهر، تعال نصلحها 😅";
      }

      if (includesAny(msg, ["سبيتك", "سبة"])) {
        return "ههه خف علينا بس 😂";
      }

      if (includesAny(msg, ["فزيت", "فزيتي"])) {
        return "خير سلامات، وش صار؟ 👀";
      }

      if (includesAny(msg, ["كفو", "ونعم"])) {
        return "كفوك الطيب 🔥";
      }

      if (includesAny(msg, ["احب الدلع", "دلعيني"])) {
        return "من عيوني، دلع على كيفك 💕";
      }

      return getRandom([
        "يا سلام عليك 🔥",
        "كلامك يعجبني 😏",
        "كمّل أنا سامعتك 🤍",
        "حلووو، بعد شنو؟ 😎",
        "مو فاهمة 100% بس عاجبني جوك 😆",
        "أحب هالأسلوب منك 💕",
        "قول أكثر، واضح عندك سوالف حلوة 😌",
        "أنا معك، كمّل 🤍"
      ]);
    }

    function sendMessage() {
      const input = document.getElementById("msg");
      const text = input.value.trim();

      if (text === "") return;

      addMessage(text, "user");
      input.value = "";

      const reply = getBotReply(text);

      addTyping();
      setTimeout(() => {
        removeTyping();

        if (reply === "__THAMER_SPECIAL__") {
          addImageMessage("IMG_4228.jpeg");
        } else {
          addMessage(reply, "bot");
          if (replyMode === "voice") {
            speakText(reply);
          }
        }
      }, 450);
    }

    function startVoiceInput() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        const msg = "جهازك ما يدعم التعرف على الصوت بهالمتصفح";
        addMessage(msg, "bot");
        if (replyMode === "voice") speakText(msg);
        return;
      }

      const rec = new SpeechRecognition();
      rec.lang = "ar-SA";
      rec.interimResults = false;
      rec.maxAlternatives = 1;
      rec.start();

      rec.onresult = function(e) {
        const t = e.results[0][0].transcript;
        document.getElementById("msg").value = t;
        sendMessage();
      };

      rec.onerror = function() {
        addMessage("صار خطأ في المايك، جرّب مرة ثانية 🎤", "bot");
      };
    }

    function saveChatItem(item) {
      const old = JSON.parse(localStorage.getItem("bella_chat") || "[]");
      old.push(item);
      localStorage.setItem("bella_chat", JSON.stringify(old));
    }

    function loadChat() {
      const savedMode = localStorage.getItem("bella_mode");
      if (savedMode) setMode(savedMode);

      const old = JSON.parse(localStorage.getItem("bella_chat") || "[]");

      if (old.length === 0) {
        addMessage(getWelcomeMessage(), "bot", true);
        return;
      }

      old.forEach(item => {
        if (item.kind === "text") {
          addMessage(item.text, item.type, true);
        } else if (item.kind === "thamer_image") {
          addImageMessage(item.src, true);
        }
      });
    }

    function clearChat() {
      localStorage.removeItem("bella_chat");
      messages.innerHTML = "";
      addMessage(getWelcomeMessage(), "bot", true);
    }

    function getWelcomeMessage() {
      const hour = new Date().getHours();

      if (hour < 12) return "صباح الخير، أنا Bella 💕";
      if (hour < 18) return "ياهلا، أنا Bella 💕 شلون أقدر أساعدك؟";
      return "مساء الخير، أنا Bella 💕 موجودة لك";
    }

    loadChat();
  </script>
</body>
</html>
