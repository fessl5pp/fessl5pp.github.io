<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>موقع فيصل</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000, #1a1a1a);
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    .box {
      max-width: 420px;
      margin: auto;
      background: #111;
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 0 20px rgba(0,255,200,0.25);
    }

    h1 {
      color: #00ffcc;
      margin-bottom: 10px;
    }

    p {
      color: #ddd;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      outline: none;
      box-sizing: border-box;
    }

    button, .wa {
      display: block;
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      text-decoration: none;
    }

    button {
      background: #00ffcc;
      color: black;
      font-weight: bold;
    }

    .wa {
      background: #25D366;
      color: white;
    }

    #msg {
      margin-top: 12px;
      color: #00ffcc;
    }
  </style>
</head>
