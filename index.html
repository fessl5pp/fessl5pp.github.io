<!DOCTYPE html>
<html>
<head>
  <title>Faisal Site</title>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
      padding-top: 50px;
    }

    h1 {
      color: #00ffcc;
    }

    .box {
      background: #1a1a1a;
      margin: auto;
      padding: 20px;
      width: 300px;
      border-radius: 15px;
      box-shadow: 0 0 20px #00ffcc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #00ffcc;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    #title {
      margin-top: 20px;
      font-size: 20px;
      color: #00ffcc;
    }

    img {
      margin-top: 10px;
      width: 250px;
      border-radius: 15px;
      display: none;
    }
  </style>
</head>
<body>

  <h1>🔥 اختر 🔥</h1>

  <div class="box">
    <button onclick="showFaisal()">فيصل</button>
    <button onclick="showThamer()">ثامر</button>

    <div id="title"></div>

    <img id="image" src="">
  </div>

  <script>
    function showFaisal() {
      document.getElementById("title").innerText = "ساطي";
      document.getElementById("image").src = "69F6A81B-0CEB-4D20-9980-D14353C7E57A.png";
      document.getElementById("image").style.display = "block";
    }

    function showThamer() {
      document.getElementById("title").innerText = "لقى";
      document.getElementById("image").src = "69F6A81B-0CEB-4D20-9980-D14353C7E57A.png";
      document.getElementById("image").style.display = "block";
    }
  </script>

</body>
</html>
