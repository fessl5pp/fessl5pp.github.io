<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bella Kuwaiti Pro - v3.0 Ultimate</title>
  <style>
    /* الحفاظ على التصميم الأصلي الاحترافي بالكامل */
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#09090b;--bg2:#121317;--panel:rgba(23,24,29,.92);--panel2:rgba(34,36,44,.95);
      --line:rgba(255,255,255,.08);--text:#fff;--muted:#b5bac5;--accent:#0a84ff;--accent2:#6d5efc;
      --pink:#ff4d8d;--gold:#ffcc00;--orange:#ff9f0a;--bot:#2b2d33;--user:#0a84ff;--bubble:#1b1d23;
      --shadow:0 22px 55px rgba(0,0,0,.35)
    }
    body.theme-pink{--accent:#ff4d8d;--accent2:#ff8db7;--user:#ff4d8d}
    body.theme-blue{--accent:#0a84ff;--accent2:#6d5efc;--user:#0a84ff}
    body{margin:0;min-height:100vh;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial,sans-serif;
      background:radial-gradient(circle at top, rgba(109,94,252,.16), transparent 24%),linear-gradient(180deg,var(--bg),var(--bg2));
      padding:24px 14px 120px;text-align:center}

    /* الستايلات الأصلية لنظام الـ XP والرتب */
    .hero{width:min(560px,100%);margin:0 auto 18px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:30px;padding:22px 18px;backdrop-filter:blur(14px)}
    .xpCard{background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:18px;padding:12px;margin-bottom:15px;text-align:right}
    .xpBar{width:100%;height:8px;border-radius:999px;background:rgba(255,255,255,.08);margin-top:8px;overflow:hidden}
    .xpFill{height:100%;background:linear-gradient(90deg,var(--gold),var(--orange));width:0%;transition:width .3s ease}
    
    .statsGrid{width:min(720px,100%);margin:0 auto 18px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .stat{background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:20px;padding:12px 10px}
    .stat b{display:block;font-size:18px}.stat span{display:block;color:var(--muted);font-size:12px}

    /* واجهة المحادثة والمودات */
    .chatShell{width:min(480px,calc(100% - 12px));position:fixed;left:50%;transform:translateX(-50%);bottom:12px;background:var(--panel);border:1px solid var(--line);border-radius:30px;overflow:hidden;box-shadow:var(--shadow);backdrop-filter:blur(18px);display:none;z-index:1000}
    .chatShell.open{display:block}
    .modeBar {display:flex;gap:8px;padding:10px;overflow-x:auto;background:rgba(0,0,0,0.3);border-bottom:1px solid var(--line);scrollbar-width:none}
    .pill {border:none;padding:8px 16px;border-radius:20px;background:rgba(255,255,255,0.06);color:white;cursor:pointer;white-space:nowrap;font-size:12px}
    .pill.active {background:var(--accent);font-weight:bold}

    .messages{height:350px;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:12px;background:#000;scroll-behavior:smooth}
    .msg{max-width:85%;padding:12px 16px;border-radius:22px;font-size:14px;line-height:1.6;animation:fadeIn 0.2s}
    .msg.bot{align-self:flex-start;background:var(--bot);border-bottom-left-radius:4px}
    .msg.user{align-self:flex-end;background:var(--user);border-bottom-right-radius:4px}
    
    .inputArea{display:flex;gap:8px;padding:12px;background:var(--panel2)}
    input{flex:1;background:var(--bubble);border:1px solid var(--line);padding:12px;border-radius:18px;color:white;outline:none}
    .sendBtn{background:var(--accent);border:none;padding:0 22px;border-radius:18px;color:white;font-weight:bold;cursor:pointer}

    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:2000}
    .modal.show{display:flex}
    .card{background:#1c1d22;padding:25px;border-radius:30px;width:90%;max-width:400px;text-align:center;border:1px solid var(--line)}

    @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body class="theme-blue">

  <div class="page">
    <section class="hero">
      <div class="xpCard">
        <div style="display:flex;justify-content:space-between">
          <b id="xpLevel">LVL 1</b>
          <span id="xpValue">0 XP</span>
        </div>
        <div class="xpBar"><div class="xpFill" id="xpFill"></div></div>
        <div style="font-size:12px;margin-top:5px" id="xpRank">الرتبة: مبتدئ</div>
      </div>
      <h1 id="heroWelcome">يا هلا فيك!</h1>
      <button class="sendBtn" style="padding:15px 30px" onclick="openChat()">سولف مع Bella 💬</button>
    </section>

    <section class="statsGrid">
      <div class="stat"><b id="statMsgs">0</b><span>رسائلك</span></div>
      <div class="stat"><b id="statLvl">1</b><span>المستوى</span></div>
      <div class="stat"><b id="statAch">0</b><span>إنجازات</span></div>
      <div class="stat"><b id="statStreak">0</b><span>أيام</span></div>
    </section>
  </div>

  <div class="chatShell" id="chatShell">
    <div class="modeBar">
      <button class="pill active" onclick="setMode('auto', this)">🤖 أوتو</button>
      <button class="pill" onclick="setMode('cute', this)">💕 دلوعة</button>
      <button class="pill" onclick="setMode('calm', this)">🤍 مروقة</button>
      <button class="pill" onclick="setMode('mad', this)">💢 معصبة</button>
    </div>
    <div class="messages" id="chatBox"></div>
    <div class="inputArea">
      <input type="text" id="userInput" placeholder="اكتب شي..." onkeypress="if(event.key==='Enter') send()">
      <button class="sendBtn" onclick="send()">إرسال</button>
    </div>
  </div>

  <div class="modal show" id="startModal">
    <div class="card">
      <h2>حياك الله! 👋</h2>
      <p>اكتب اسمك عشان Bella تناديك فيه وتعرفك</p>
      <input type="text" id="userName" style="width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none" placeholder="اسمك الكريم..">
      <div style="display:flex;gap:10px">
        <button class="sendBtn" style="flex:1;background:var(--accent)" onclick="initApp('male')">👨 ولد</button>
        <button class="sendBtn" style="flex:1;background:var(--pink)" onclick="initApp('female')">👩 بنت</button>
      </div>
    </div>
  </div>

  <script>
    // --- النظام الكامل (XP + State + AI) ---
    const state = {
      name: 'صديقي',
      gender: 'male',
      mode: 'auto',
      xp: 0,
      msgs: 0,
      lvl: 1,
      ach: 0
    };

    const DB = {
      auto: { m:["هلا [الاسم]، شلونك؟"], f:["هلا يالغالية [الاسم]، شلونج؟"] },
      cute: { m:["يا بعد قلبي يا [الاسم] 💕"], f:["يا بعد روحي يا [الاسم] 💕"] },
      calm: { m:["روق يا [الاسم] 🤍"], f:["روقي يا [الاسم] 🤍"] },
      mad: { m:["خلصني يا [الاسم] شتبي؟ 💢"], f:["شتبين يا [الاسم]؟ خلصيني 💢"] }
    };

    function initApp(g) {
      const n = document.getElementById('userName').value.trim();
      if(n) state.name = n;
      state.gender = g;
      document.body.className = g === 'female' ? 'theme-pink' : 'theme-blue';
      document.getElementById('startModal').classList.remove('show');
      document.getElementById('heroWelcome').innerText = `يا هلا بـ ${state.name}!`;
      openChat();
      addMessage('bot', `هلا والله بـ ${state.name}، نورتني! شلون أقدر أساعدك؟`);
    }

    function send() {
      const inp = document.getElementById('userInput');
      const val = inp.value.trim();
      if(!val) return;

      addMessage('user', val);
      inp.value = '';

      // تحديث نظام الـ XP والنقاط (بدون حذف!)
      state.xp += 15;
      state.msgs += 1;
      updateStats();

      setTimeout(() => {
        let r = pickReply(val);
        r = r.replace("[الاسم]", state.name);
        addMessage('bot', r);
      }, 600);
    }

    function pickReply(txt) {
      if(txt.includes("شلونك") || txt.includes("شلونج")) return "بخير يا [الاسم] دامني أكلمك، أنت شلونك؟";
      const pool = DB[state.mode][state.gender === 'female' ? 'f' : 'm'];
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function updateStats() {
      state.lvl = Math.floor(state.xp / 100) + 1;
      document.getElementById('xpLevel').innerText = "LVL " + state.lvl;
      document.getElementById('xpValue').innerText = state.xp + " XP";
      document.getElementById('xpFill').style.width = (state.xp % 100) + "%";
      document.getElementById('statMsgs').innerText = state.msgs;
      document.getElementById('statLvl').innerText = state.lvl;
      
      // إنجاز بسيط
      if(state.msgs === 5) { state.ach = 1; document.getElementById('statAch').innerText = "1"; }
    }

    function setMode(m, btn) {
      state.mode = m;
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
    }

    function addMessage(t, txt) {
      const b = document.getElementById('chatBox');
      const d = document.createElement('div');
      d.className = `msg ${t}`;
      d.innerText = txt;
      b.appendChild(d);
      b.scrollTop = b.scrollHeight;
    }

    function openChat() { document.getElementById('chatShell').classList.add('open'); }
  </script>
</body>
</html>
