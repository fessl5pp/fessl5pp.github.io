<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bella AI Pro - Kuwait 🇰🇼</title>
  <style>
    /* التنسيقات المتطورة */
    :root {
      --bg: #09090b; --panel: rgba(23, 24, 29, 0.95);
      --accent: #0a84ff; --text: #ffffff; --muted: #b5bac5;
      --bot-bg: #1b1d23; --user-bg: #0a84ff;
    }
    body.theme-pink { --accent: #ff4d8d; --user-bg: #ff4d8d; }
    body.theme-blue { --accent: #0a84ff; --user-bg: #0a84ff; }

    body {
      background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
    }
    .chat-card {
      width: 100%; max-width: 500px; background: var(--panel); border-radius: 30px;
      overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
    }
    .header { padding: 20px; background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
    .header h2 { margin: 0; font-size: 22px; color: var(--accent); }
    
    /* شريط المودات الجديد */
    .mode-selector {
      display: flex; gap: 8px; padding: 10px; background: rgba(0,0,0,0.2);
      overflow-x: auto; justify-content: center;
    }
    .mode-btn {
      border: none; padding: 8px 15px; border-radius: 20px; background: rgba(255,255,255,0.1);
      color: white; cursor: pointer; font-size: 13px; transition: 0.3s; white-space: nowrap;
    }
    .mode-btn.active { background: var(--accent); font-weight: bold; }

    .messages { height: 400px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .msg { max-width: 80%; padding: 12px 18px; border-radius: 20px; line-height: 1.5; font-size: 15px; animation: fadeIn 0.3s; }
    .msg.bot { align-self: flex-start; background: var(--bot-bg); border-bottom-left-radius: 5px; }
    .msg.user { align-self: flex-end; background: var(--user-bg); border-bottom-right-radius: 5px; }
    .typing { font-size: 12px; color: var(--muted); margin-bottom: 10px; display: none; }

    .input-area { padding: 20px; display: flex; gap: 10px; background: rgba(255,255,255,0.02); }
    input { flex: 1; background: #272930; border: none; padding: 12px; border-radius: 15px; color: white; outline: none; }
    button.send { background: var(--accent); border: none; padding: 10px 20px; border-radius: 15px; color: white; cursor: pointer; font-weight: bold; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="theme-blue">

<div class="chat-card">
  <div class="header">
    <h2>Bella AI 🇰🇼</h2>
    <div id="status" style="font-size: 12px; color: var(--muted);">المود الحالي: تلقائي</div>
  </div>

  <div class="mode-selector" id="modeSelector">
    <button class="mode-btn active" onclick="setMode('auto')">🤖 Auto</button>
    <button class="mode-btn" onclick="setMode('cute')">💕 دلوعة</button>
    <button class="mode-btn" onclick="setMode('calm')">🤍 مروقة</button>
    <button class="mode-btn" onclick="setMode('mad')">💢 معصبة</button>
  </div>

  <div class="messages" id="chatBox">
    <div class="msg bot">هلا والله! أنا بيلا.. شلون أقدر أساعدك اليوم؟</div>
  </div>
  
  <div id="typing" class="typing" style="padding-left: 20px;">Bella تكتب الآن...</div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="اكتب شي..." onkeypress="handleKey(event)">
    <button class="send" onclick="sendMsg()">إرسال</button>
  </div>
</div>

<script>
  let currentMode = 'auto';
  const chatBox = document.getElementById('chatBox');
  const typing = document.getElementById('typing');

  // إعدادات الردود لكل مود
  const responses = {
    cute: ["يا بعد قلبي والله.. آمري تدللي 💕", "يا عيون بيلا أنت.. شلونه يومك؟ 🥰", "فديتك.. قولي اللي بخاطرك وأنا أسمعك ✨"],
    calm: ["هلا بالزين.. الدنيا ما تسوى، روق وقولي شعندك 🤍", "يا هلا.. أنا معاك، خذ راحتك بالكلام ☕", "سمّ.. آمر وش بخاطرك؟ أنا أسمعك بكل هدوء"],
    mad: ["خلصني شتبي؟ ماني فاضية حق الحنة 💢", "ترى حدي واصلة معاي.. قول اللي عندك بسرعة 😒", "أوف.. وبعدين؟ شتبي الحين؟"],
    auto: ["هلا فيك، شلون أقدر أساعدك؟", "أنا موجودة عشانك، تفضل", "شلون الأمور معاك اليوم؟"]
  };

  function setMode(mode) {
    currentMode = mode;
    // تحديث شكل الأزرار
    document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    
    // تحديث الحالة
    const statusTxt = {auto: 'تلقائي', cute: 'دلوعة', calm: 'مروقة', mad: 'معصبة'};
    document.getElementById('status').innerText = "المود الحالي: " + statusTxt[mode];
    
    // رد فعلي فوري عند تغيير المود
    showTyping();
    setTimeout(() => {
      hideTyping();
      addMessage('bot', "تم تغيير المود إلى: " + statusTxt[mode] + ".. الحين أنا جاهزة!");
    }, 600);
  }

  function sendMsg() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    addMessage('user', text);
    input.value = '';

    showTyping();

    // محاكاة تفكير الـ AI والرد بناءً على المود
    setTimeout(() => {
      hideTyping();
      const reply = pickResponse(text);
      addMessage('bot', reply);
    }, 1000);
  }

  function pickResponse(userText) {
    // منطق ذكي بسيط: إذا سأل عن شيء معين
    if (userText.includes("شلونك")) return currentMode === 'mad' ? "مو شغلك!" : "بخير دامك بخير";
    
    // الرد العشوائي بناءً على المود المختار
    const pool = responses[currentMode];
    return pool[Math.floor(Math.random() * pool.length)];
  }

  function addMessage(sender, text) {
    const div = document.createElement('div');
    div.className = `msg ${sender}`;
    div.innerText = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function showTyping() { typing.style.display = 'block'; chatBox.scrollTop = chatBox.scrollHeight; }
  function hideTyping() { typing.style.display = 'none'; }
  function handleKey(e) { if (e.key === 'Enter') sendMsg(); }

</script>
</body>
</html>
