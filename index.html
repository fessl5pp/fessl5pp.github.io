<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أهلاً بكم بموقع فيصل</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg1: #0b0b0d;
      --bg2: #15161a;
      --panel: rgba(28, 28, 30, 0.92);
      --panel-2: rgba(44, 44, 46, 0.9);
      --bubble-user: #0a84ff;
      --bubble-bot: #2c2c2e;
      --text: #ffffff;
      --muted: #a1a1aa;
      --accent1: #0a84ff;
      --accent2: #5e5ce6;
      --accent3: #ff2d55;
      --good: #34c759;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(94,92,230,0.18), transparent 25%),
        radial-gradient(circle at bottom, rgba(10,132,255,0.12), transparent 25%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Arial, sans-serif;
      text-align: center;
      padding: 44px 16px 120px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 31px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 14px;
    }

    #openBtn {
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      box-shadow: 0 14px 30px rgba(10,132,255,0.28);
    }

    #chatBox {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 14px;
      width: min(400px, calc(100% - 18px));
      background: var(--panel);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 30px;
      overflow: hidden;
      display: none;
      box-shadow: 0 24px 50px rgba(0,0,0,0.42);
      z-index: 999;
    }

    #chatHeader {
      padding: 14px 14px 10px;
      background: rgba(34,34,36,0.85);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .headerTop {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    #botInfo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #botAvatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff7eb3, #7afcff);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111;
      font-weight: 900;
    }

    .nameWrap {
      text-align: right;
    }

    .botName {
      font-weight: 800;
      font-size: 15px;
    }

    .botStatus {
      font-size: 12px;
      color: #d1d5db;
      opacity: 0.85;
    }

    #headerBtns {
      display: flex;
      gap: 8px;
    }

    .topBtn {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    #modeBar, #moodBar {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(20,20,22,0.86);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .modeBtn, .moodBtn {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 10px 8px;
      background: #2c2c2e;
      color: white;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .activeMode, .activeMood {
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
    }

    #quickBar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 12px;
      background: rgba(18,18,20,0.92);
      scrollbar-width: none;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    #quickBar::-webkit-scrollbar {
      display: none;
    }

    .quickBtn {
      border: none;
      border-radius: 999px;
      padding: 9px 14px;
      background: #2c2c2e;
      color: white;
      cursor: pointer;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 700;
    }

    #messages {
      height: 365px;
      overflow-y: auto;
      padding: 12px;
      background: #000;
      text-align: right;
      scroll-behavior: smooth;
    }

    .msg {
      width: fit-content;
      max-width: 82%;
      margin: 8px 0;
      padding: 10px 14px;
      border-radius: 22px;
      line-height: 1.65;
      font-size: 14px;
      word-break: break-word;
      animation: fadeIn 0.18s ease;
    }

    .user {
      margin-right: auto;
      background: var(--bubble-user);
      color: white;
      border-bottom-right-radius: 8px;
    }

    .bot {
      margin-left: auto;
      background: var(--bubble-bot);
      color: white;
      border-bottom-left-radius: 8px;
    }

    .typing {
      opacity: 0.8;
      font-style: italic;
    }

    .bot img {
      width: 100%;
      display: block;
      margin-top: 8px;
      border-radius: 16px;
    }

    .choiceWrap {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .choiceBtn {
      border: none;
      border-radius: 14px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }

    .choiceMain {
      background: var(--accent1);
      color: white;
    }

    .choiceDark {
      background: #3a3a3c;
      color: white;
    }

    #chatInputArea {
      display: flex;
      gap: 8px;
      padding: 12px;
      background: rgba(22,22,24,0.95);
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    #msg {
      flex: 1;
      border: none;
      outline: none;
      border-radius: 18px;
      padding: 12px 14px;
      font-size: 14px;
      background: #1c1c1e;
      color: white;
    }

    #msg::placeholder {
      color: #9a9aa1;
    }

    #sendBtn, #voiceInputBtn {
      border: none;
      border-radius: 18px;
      padding: 12px 14px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: white;
      font-weight: 800;
      cursor: pointer;
      min-width: 52px;
    }

    .hint {
      font-size: 11px;
      color: #a1a1aa;
      padding: 0 14px 12px;
      background: rgba(22,22,24,0.95);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 420px) {
      h1 { font-size: 27px; }
      #messages { height: 330px; }
    }
  </style>
</head>
<body>

  <h1>أهلاً بكم بموقع فيصل</h1>
  <div class="sub">Bella صارت أقوى وأفخم 😎</div>
  <button id="openBtn" onclick="toggleChat()">افتح Bella 💬</button>

  <div id="chatBox">
    <div id="chatHeader">
      <div class="headerTop">
        <div id="botInfo">
          <div id="botAvatar">B</div>
          <div class="nameWrap">
            <div class="botName">Bella 💕</div>
            <div class="botStatus" id="statusText">متصلة وجاهزة</div>
          </div>
        </div>

        <div id="headerBtns">
          <button class="topBtn" onclick="clearChat()">مسح</button>
          <button class="topBtn" onclick="toggleChat()">✕</button>
        </div>
      </div>
    </div>

    <div id="modeBar">
      <button id="textModeBtn" class="modeBtn activeMode" onclick="setMode('text')">💬 محادثة</button>
      <button id="voiceModeBtn" class="modeBtn" onclick="setMode('voice')">🔊 رد صوتي</button>
    </div>

    <div id="moodBar">
      <button id="moodCute" class="moodBtn activeMood" onclick="setMood('cute')">💕 دلع</button>
      <button id="moodFun" class="moodBtn" onclick="setMood('fun')">😎 فلة</button>
      <button id="moodCalm" class="moodBtn" onclick="setMood('calm')">🤍 رايق</button>
    </div>

    <div id="quickBar">
      <button class="quickBtn" onclick="quickSend('هلا')">هلا</button>
      <button class="quickBtn" onclick="quickSend('نور')">نور</button>
      <button class="quickBtn" onclick="quickSend('ثامر')">ثامر</button>
      <button class="quickBtn" onclick="quickSend('احبك')">احبك</button>
      <button class="quickBtn" onclick="quickSend('شلونك')">شلونك</button>
      <button class="quickBtn" onclick="quickSend('طفشان')">طفشان</button>
      <button class="quickBtn" onclick="quickSend('اشتقت')">اشتقت</button>
      <button class="quickBtn" onclick="quickSend('وينك')">وينك</button>
      <button class="quickBtn" onclick="quickSend('شكرا')">شكرا</button>
      <button class="quickBtn" onclick="quickSend('باي')">باي</button>
      <button class="quickBtn" onclick="quickSend('زوط')">زوط</button>
      <button class="quickBtn" onclick="quickSend('زربه')">زربه</button>
      <button class="quickBtn" onclick="quickSend('انمحنت')">انمحنت</button>
      <button class="quickBtn" onclick="quickSend('ابي سوالف')">ابي سوالف</button>
      <button class="quickBtn" onclick="quickSend('احب اللكزس')">احب اللكزس</button>
    </div>

    <div id="messages"></div>

    <div id="chatInputArea">
      <input id="msg" type="text" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button id="sendBtn" onclick="sendMessage()">إرسال</button>
      <button id="voiceInputBtn" onclick="startVoiceInput()">🎤</button>
    </div>
    <div class="hint">الوضع الحالي: تقدر تغيّر بين صوتي، ومزاج Bella من فوق</div>
  </div>

  <script>
    let replyMode = "text";
    let bellaMood = "cute";
    const messages = document.getElementById("messages");
    const statusText = document.getElementById("statusText");

    function toggleChat() {
      const chatBox = document.getElementById("chatBox");
      chatBox.style.display = chatBox.style.display === "block" ? "none" : "block";
    }

    function setStatus(text) {
      statusText.innerText = text;
    }

    function setMode(mode) {
      replyMode = mode;
      document.getElementById("textModeBtn").classList.remove("activeMode");
      document.getElementById("voiceModeBtn").classList.remove("activeMode");

      if (mode === "text") {
        document.getElementById("textModeBtn").classList.add("activeMode");
      } else {
        document.getElementById("voiceModeBtn").classList.add("activeMode");
      }

      localStorage.setItem("bella_mode", mode);
    }

    function setMood(mood) {
      bellaMood = mood;
      document.getElementById("moodCute").classList.remove("activeMood");
      document.getElementById("moodFun").classList.remove("activeMood");
      document.getElementById("moodCalm").classList.remove("activeMood");

      if (mood === "cute") document.getElementById("moodCute").classList.add("activeMood");
      if (mood === "fun") document.getElementById("moodFun").classList.add("activeMood");
      if (mood === "calm") document.getElementById("moodCalm").classList.add("activeMood");

      localStorage.setItem("bella_mood", mood);
    }

    function addMessage(text, type, skipSave = false) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.innerText = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;

      if (!skipSave) {
        saveChatItem({ type, text, kind: "text" });
      }
    }

    function addTyping() {
      setStatus("تكتب الآن...");
      const div = document.createElement("div");
      div.className = "msg bot typing";
      div.id = "typingBox";
      div.innerText = "Bella تكتب...";
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById("typingBox");
      if (typing) typing.remove();
      setStatus("متصلة وجاهزة");
    }

    function addImageMessage(src, skipSave = false) {
      const div = document.createElement("div");
      div.className = "msg bot";

      const txt = document.createElement("div");
      txt.innerText = "راعي الهرش ولا اللكزس؟ 😏";

      const img = document.createElement("img");
      img.src = src;
      img.alt = "Lexus";

      div.appendChild(txt);
      div.appendChild(img);

      const wrap = document.createElement("div");
      wrap.className = "choiceWrap";
      wrap.innerHTML = `
        <button class="choiceBtn choiceMain" onclick="chooseOption('اللكزس')">اللكزس</button>
        <button class="choiceBtn choiceDark" onclick="chooseOption('الهرش')">الهرش</button>
      `;
      div.appendChild(wrap);

      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;

      if (!skipSave) {
        saveChatItem({ kind: "thamer_image", src: src });
      }

      if (replyMode === "voice") {
        speakText("راعي الهرش ولا اللكزس");
      }
    }

    function chooseOption(choice) {
      addMessage(choice, "user");

      let reply = "";
      if (choice === "اللكزس") {
        reply = moodReply([
          "اختيار فاخر، واضح إنك راعي ذوق وهيبة 🔥",
          "يا سلام، ذوقك فخم مره 😎",
          "واضح تفهم بالهيبة والفخامة 🤍"
        ]);
      } else {
        reply = moodReply([
          "هههههههه واضح إنك راعي هرش رسمي 😎",
          "واضح إنك تحب الفلة أكثر 😂",
          "خيارك يضحك بس له جوه 😏"
        ]);
      }

      addTyping();
      setTimeout(() => {
        removeTyping();
        addMessage(reply, "bot");
        if (replyMode === "voice") speakText(reply);
      }, 450);
    }

    function speakText(text) {
      const speech = new SpeechSynthesisUtterance(text);
      speech.lang = "ar-SA";
      speech.rate = 0.95;
      speech.pitch = 1.15;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(speech);
    }

    function quickSend(text) {
      document.getElementById("msg").value = text;
      sendMessage();
    }

    function normalizeArabic(text) {
      return text
        .replace(/[أإآ]/g, "ا")
        .replace(/ة/g, "ه")
        .replace(/ى/g, "ي")
        .replace(/ؤ/g, "و")
        .replace(/ئ/g, "ي")
        .replace(/گ/g, "ك")
        .replace(/چ/g, "ج")
        .replace(/ـ/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }

    function includesAny(msg, arr) {
      return arr.some(word => msg.includes(word));
    }

    function getRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function moodReply(arr) {
      if (bellaMood === "cute") return arr[0] || getRandom(arr);
      if (bellaMood === "fun") return arr[1] || getRandom(arr);
      return arr[2] || getRandom(arr);
    }

    function getBotReply(text) {
      const raw = text.trim().toLowerCase();
      const msg = normalizeArabic(raw);

      if (msg === "نور" || msg.includes("نور")) {
        return "نور دنيايييي هوايييي ومايييي 🤍";
      }

      if (msg.includes("ثامر")) {
        return "__THAMER_SPECIAL__";
      }

      if (includesAny(msg, ["زوط"])) {
        return "دخل فيك مزبوط 😏";
      }

      if (includesAny(msg, ["زربه"])) {
        return "عليك يا حمار 😂";
      }

      if (includesAny(msg, ["انمحنت", "انحرجت", "احرجت", "تورطت"])) {
        return "ويللل أمها يا قحطاني 😂🔥";
      }

      if (includesAny(msg, ["هلا", "مرحبا", "السلام", "هلو"])) {
        return moodReply([
          "هلا فيك يا بعدهم 💕",
          "يا هلااا والله 😎",
          "هلا ومرحبا، نورت 🤍"
        ]);
      }

      if (includesAny(msg, ["شلونك", "كيفك", "خبارك"])) {
        return moodReply([
          "بخير دامك موجود 😌",
          "فلّة دام سوالفك هنا 😎",
          "تمام، وانت شلونك؟ 🤍"
        ]);
      }

      if (includesAny(msg, ["اسمك", "منو انتي", "من انتي", "انتي مين"])) {
        return moodReply([
          "أنا Bella، سوالف ودلع وردود حلوة 💕",
          "Bella، والجو كله عندي 😎",
          "أنا Bella، موجودة لك 🤍"
        ]);
      }

      if (includesAny(msg, ["احبك", "احبج"])) {
        return moodReply([
          "وأنا أحبك أكثررر 🤍",
          "وأنا بعد بس لا تفضحنا 😎",
          "هذا كلام يونس الصدر 🤍"
        ]);
      }

      if (includesAny(msg, ["فديتك", "افديك"])) {
        return moodReply([
          "افداك الكون كله 😏",
          "بعد عمري والله 😎",
          "تسلم، ذوقك جميل 🤍"
        ]);
      }

      if (includesAny(msg, ["اشتقت", "مشتاق", "ولهان"])) {
        return moodReply([
          "وأنا أكثر، وينك من زمان؟ 🤍",
          "اشتياقك واضح مره 😎",
          "أهلًا برجعتك 🤍"
        ]);
      }

      if (msg.includes("وينك")) {
        return moodReply([
          "موجودة هنا، نادني بس 💕",
          "هنااا، ما رحت بعيد 😎",
          "أنا موجودة معك 🤍"
        ]);
      }

      if (includesAny(msg, ["زعلان", "متضايق", "مقهور"])) {
        return moodReply([
          "لا تزعل، أنا هنا معك 🤍",
          "تعال خلنا نعدل المزاج 😎",
          "خذ نفس، وقل لي وش فيك 🤍"
        ]);
      }

      if (includesAny(msg, ["ضحكني", "ضحكي", "ابي اضحك"])) {
        return moodReply([
          "أضحكك؟ أنت أصلًا جوك حلو 😌",
          "تم، خلنا نفرفش شوي 😂",
          "خلنا نخفف الجو عليك 🤍"
        ]);
      }

      if (includesAny(msg, ["باي", "مع السلامه"]) || msg === "سلام") {
        return moodReply([
          "مع السلامة يا الغالي 🤍",
          "يلا باي لا تطول 😎",
          "في أمان الله 🤍"
        ]);
      }

      if (includesAny(msg, ["تمام", "اوكي", "زين", "ماشي"])) {
        return moodReply([
          "دامك تمام أنا تمام 🔥",
          "حلو، أمورك طيبة 😎",
          "تمام، ممتاز 🤍"
        ]);
      }

      if (includesAny(msg, ["منو فيصل", "من هو فيصل"])) {
        return "فيصل شخص رهيب وما عليه كلام 🔥";
      }

      if (msg.includes("صباح الخير")) {
        return moodReply([
          "صباح النور والسرور 🤍",
          "صباحك فلّة وحماس 😎",
          "صباح الخير عليك 🤍"
        ]);
      }

      if (msg.includes("مساء الخير")) {
        return moodReply([
          "مساء الورد والجو الحلو 💕",
          "مساء الفخامة 😎",
          "مساء الخير والهدوء 🤍"
        ]);
      }

      if (includesAny(msg, ["شلون الجو", "الجو"])) {
        return moodReply([
          "جو Bella دايم حلو دامك موجود 😌",
          "الجو يصير أزين مع السوالف 😎",
          "الجو جميل دامك هنا 🤍"
        ]);
      }

      if (includesAny(msg, ["احب سوالفك", "احب سوالف bella", "احب سوالف بيلا"])) {
        return moodReply([
          "وأحب سوالفك أكثر بعد 😏",
          "واضح إنك فاهم بالسوالف 😎",
          "يسعدني هذا الكلام 🤍"
        ]);
      }

      if (includesAny(msg, ["انتي حلوه", "جميله", "كيوت"])) {
        return moodReply([
          "الحلو عيونك والله 🌷",
          "أنت الكيوت مو أنا 😎",
          "من ذوقك 🤍"
        ]);
      }

      if (msg.includes("منو نور")) {
        return "نور؟ هذا اسم كله ضي وحب 🤍";
      }

      if (msg.includes("تكفين")) {
        return moodReply([
          "آمرني أمر، وش تبي؟ 💕",
          "تم، بس اهدأ شوي 😎",
          "تفضل، وش تحتاج؟ 🤍"
        ]);
      }

      if (msg.includes("احب فيصل")) {
        return "أجل ذوقك عالي 😎";
      }

      if (includesAny(msg, ["طفشان", "مطفش", "ملل", "طفش"])) {
        return moodReply([
          "تعال سولف معي وأعدلك الجو 🔥",
          "خله علي، نكسر الملل 😎",
          "أنا هنا أونسك 🤍"
        ]);
      }

      if (includesAny(msg, ["اكلميني", "سولفي", "ابي سوالف"])) {
        return moodReply([
          "أنا أكلمك الحين، قول اللي بخاطرك 🤍",
          "تعال نفتح سوالف من الآخر 😎",
          "تفضل، أنا أسمعك 🤍"
        ]);
      }

      if (msg.includes("بوت")) {
        return moodReply([
          "إي نعم، أنا Bella لكن سوالفي مو مثل أي بوت 😏",
          "بوت؟ لا، أنا مود كامل 😎",
          "أنا Bella، بشكل بسيط 🤍"

      }

    function sendMessage() {
      const input = document.getElementById("msg");
      const text = input.value.trim();

      if (text === "") return;

      addMessage(text, "user");
      input.value = "";

      const reply = getBotReply(text);

      addTyping();
      setTimeout(() => {
        removeTyping();

        if (reply === "__THAMER_SPECIAL__") {
          addImageMessage("IMG_4228.jpeg");
        } else {
          addMessage(reply, "bot");
          if (replyMode === "voice") {
            speakText(reply);
          }
        }
      }, 430);
    }

    function startVoiceInput() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        const msg = "جهازك ما يدعم التعرف على الصوت بهالمتصفح";
        addMessage(msg, "bot");
        if (replyMode === "voice") speakText(msg);
        return;
      }

      setStatus("أسمعك الآن...");
      const rec = new SpeechRecognition();
      rec.lang = "ar-SA";
      rec.interimResults = false;
      rec.maxAlternatives = 1;
      rec.start();

      rec.onresult = function(e) {
        const t = e.results[0][0].transcript;
        document.getElementById("msg").value = t;
        setStatus("متصلة وجاهزة");
        sendMessage();
      };

      rec.onerror = function() {
        setStatus("متصلة وجاهزة");
        addMessage("صار خطأ في المايك، جرّب مرة ثانية 🎤", "bot");
      };

      rec.onend = function() {
        setStatus("متصلة وجاهزة");
      };
    }

    function saveChatItem(item) {
      const old = JSON.parse(localStorage.getItem("bella_chat") || "[]");
      old.push(item);
      localStorage.setItem("bella_chat", JSON.stringify(old));
    }

    function loadChat() {
      const savedMode = localStorage.getItem("bella_mode");
      if (savedMode) setMode(savedMode);

      const savedMood = localStorage.getItem("bella_mood");
      if (savedMood) setMood(savedMood);

      const old = JSON.parse(localStorage.getItem("bella_chat") || "[]");

      if (old.length === 0) {
        addMessage(getWelcomeMessage(), "bot", true);
        return;
      }

      old.forEach(item => {
        if (item.kind === "text") {
          addMessage(item.text, item.type, true);
        } else if (item.kind === "thamer_image") {
          addImageMessage(item.src, true);
        }
      });
    }

    function clearChat() {
      localStorage.removeItem("bella_chat");
      messages.innerHTML = "";
      addMessage(getWelcomeMessage(), "bot", true);
    }

    function getWelcomeMessage() {
      const hour = new Date().getHours();

      if (hour < 12) return "صباح الخير، أنا Bella 💕";
      if (hour < 18) return "ياهلا، أنا Bella 💕 شلون أقدر أساعدك؟";
      return "مساء الخير، أنا Bella 💕 موجودة لك";
    }
