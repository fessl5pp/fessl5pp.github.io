<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bella Pro - Intelligence v6.0</title>
  <style>
    /* التنسيق الفخم المتكامل المحفوظ دائماً */
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#09090b;--bg2:#121317;--panel:rgba(23,24,29,.92);--panel2:rgba(34,36,44,.95);
      --line:rgba(255,255,255,.08);--text:#fff;--muted:#b5bac5;--accent:#0a84ff;--accent2:#6d5efc;
      --pink:#ff4d8d;--gold:#ffcc00;--orange:#ff9f0a;--bot:#2b2d33;--user:#0a84ff;--bubble:#1b1d23;
      --shadow:0 22px 55px rgba(0,0,0,.35)
    }
    body.theme-pink{--accent:#ff4d8d;--accent2:#ff8db7;--user:#ff4d8d}
    body.theme-blue{--accent:#0a84ff;--accent2:#6d5efc;--user:#0a84ff}
    body{margin:0;min-height:100vh;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial,sans-serif;
      background:radial-gradient(circle at top, rgba(109,94,252,.16), transparent 24%),linear-gradient(180deg,var(--bg),var(--bg2));
      padding:24px 14px 120px;text-align:center}
    
    /* الهوية البصرية */
    .hero{width:min(560px,100%);margin:0 auto 18px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:30px;padding:22px 18px;backdrop-filter:blur(14px)}
    .logo{width:56px;height:56px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:900;font-size:24px;color:#111;background:linear-gradient(135deg,#ff93be,#7afcff);margin-bottom:10px}
    
    /* نظام الإحصائيات (XP) المحفوظ */
    .statsGrid{width:min(720px,100%);margin:0 auto 18px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .stat{background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:20px;padding:12px 10px}
    .stat b{display:block;font-size:18px}.stat span{display:block;color:var(--muted);font-size:12px}

    /* رف الإنجازات المحفوظ */
    .ach-shelf {display:flex;justify-content:center;gap:8px;margin-top:10px}
    .badge {width:35px;height:35px;background:rgba(255,255,255,0.05);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;filter:grayscale(1);transition:0.3s;border:1px solid transparent}
    .badge.unlocked {filter:grayscale(0);background:rgba(255,215,0,0.1);border-color:var(--gold)}

    /* واجهة الشات المتقدمة */
    .chatShell{width:min(470px,calc(100% - 12px));position:fixed;left:50%;transform:translateX(-50%);bottom:12px;background:var(--panel);border:1px solid var(--line);border-radius:30px;overflow:hidden;display:none;z-index:1000;box-shadow:var(--shadow);backdrop-filter:blur(18px)}
    .chatShell.open{display:block}
    .chatHeader{padding:14px;background:var(--panel2);border-bottom:1px solid var(--line)}
    
    .modeBar {display:flex;gap:8px;padding:10px;overflow-x:auto;background:rgba(0,0,0,0.3);scrollbar-width:none}
    .pill {border:none;padding:8px 16px;border-radius:20px;background:rgba(255,255,255,0.06);color:white;cursor:pointer;font-size:12px;white-space:nowrap}
    .pill.active {background:var(--accent);font-weight:bold}

    .messages{height:350px;overflow-y:auto;background:#000;padding:15px;display:flex;flex-direction:column;gap:12px}
    .msg{max-width:85%;padding:12px 16px;border-radius:22px;font-size:14px;line-height:1.6;animation:pop 0.2s ease-out}
    .msg.bot{align-self:flex-start;background:var(--bot);border-bottom-left-radius:4px}
    .msg.user{align-self:flex-end;background:var(--user);border-bottom-right-radius:4px}

    .inputArea{display:flex;gap:8px;padding:12px;background:var(--panel2)}
    input{flex:1;background:var(--bubble);border:1px solid var(--line);padding:12px;border-radius:18px;color:white;outline:none}
    .sendBtn{background:var(--accent);border:none;padding:0 20px;border-radius:18px;color:white;font-weight:bold;cursor:pointer}

    /* المودالات */
    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(5px)}
    .modal.show{display:flex}
    .card{background:#1c1d22;padding:25px;border-radius:30px;width:90%;max-width:400px;border:1px solid var(--line)}

    @keyframes pop { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body class="theme-blue">

  <div class="page">
    <section class="hero">
      <div class="logo">B</div>
      <h1 id="heroWelcome">Bella Pro 🇰🇼</h1>
      <div class="ach-shelf">
        <div class="badge" id="ach-1" title="صديق جديد">🌱</div>
        <div class="badge" id="ach-2" title="كويتي أصلي">🇰🇼</div>
        <div class="badge" id="ach-3" title="الثرثار">💬</div>
        <div class="badge" id="ach-4" title="المستكشف">📍</div>
      </div>
      <button class="sendBtn" style="padding:15px 30px; margin-top:20px" onclick="openChat()">سولف مع Bella 💬</button>
    </section>

    <section class="statsGrid">
      <div class="stat"><b id="s-msgs">0</b><span>رسائل</span></div>
      <div class="stat"><b id="s-lvl">1</b><span>المستوى</span></div>
      <div class="stat"><b id="s-xp">0 XP</b><span>نقاطك</span></div>
      <div class="stat"><b id="s-rank">مبتدئ</b><span>الرتبة</span></div>
    </section>
  </div>

  <div class="chatShell" id="chatShell">
    <div class="chatHeader">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="text-align:right">
          <b style="font-size:16px">Bella Pro</b>
          <div id="statusTxt" style="font-size:10px;color:var(--muted)">متصلة • مود التلقائي</div>
        </div>
        <button class="pill" style="background:rgba(255,50,50,0.3)" onclick="closeChat()">✕ إغلاق</button>
      </div>
    </div>
    
    <div class="modeBar">
      <button class="pill active" onclick="setMode('auto', this)">🤖 أوتو</button>
      <button class="pill" onclick="setMode('cute', this)">💕 دلوعة</button>
      <button class="pill" onclick="setMode('calm', this)">🤍 مروقة</button>
      <button class="pill" onclick="setMode('mad', this)">💢 معصبة</button>
    </div>

    <div class="messages" id="chatBox"></div>

    <div class="inputArea">
      <input type="text" id="userInput" placeholder="اكتب شي كويتي..." onkeypress="if(event.key==='Enter') send()">
      <button class="sendBtn" onclick="send()">إرسال</button>
    </div>
  </div>

  <div class="modal show" id="startModal">
    <div class="card">
      <h2>حياك الله! 👋</h2>
      <p>عشان Bella تعرفك وتناديك باسمك..</p>
      <input type="text" id="userNameInput" style="width:100%;padding:15px;margin-bottom:15px;background:#000;border:1px solid var(--line);border-radius:15px;color:white;text-align:center" placeholder="اسمك الكريم..">
      <div style="display:flex;gap:10px">
        <button class="sendBtn" style="flex:1" onclick="initApp('male')">👨 ولد</button>
        <button class="sendBtn" style="flex:1;background:var(--pink)" onclick="initApp('female')">👩 بنت</button>
      </div>
    </div>
  </div>

  <script>
    // --- قاعدة بيانات الذكاء المتقدمة v6.0 ---
    const INTEL = {
      greeting: {
        keys: ["هلا", "مرحبا", "سلام", "قوة", "هايو"],
        m: ["يا هلا بـ [الاسم]! نورت يالحبيب", "أهلين [الاسم]، منور يا بطل", "هلا والله وغلا بـ [الاسم]، شلون أقدر أخدمك؟"],
        f: ["أهلين بـ [الاسم]! نورتي يا قلبي", "يا هلا وغلا بـ [الاسم]، حياج الله يالغالية", "أهلين [الاسم]، منورة الدنيا كلها"]
      },
      status: {
        keys: ["شلونك", "شخبارك", "شحالك", "عساك بخير", "علومك", "شالدنيا فيك"],
        m: ["بخير ربي يسلمك يا [الاسم]، أنت شلونك؟", "تمام التمام دامني أكلمك يا [الاسم]!", "عايشين بفضل الله، أنت شخبارك يا بطل؟"],
        f: ["بخير يا بعد روحي يا [الاسم]، أنتي شلونج؟", "عال العال يالغالية [الاسم]، بشوفج طيبة أنا طيبة", "أنا تمام، قولي لي أنتي شخبارج يا قلبي؟"]
      },
      time: {
        keys: ["صباح", "مساء"],
        morning: ["صباح الورد يا [الاسم]، مصحصح؟ ☕", "أحلى صباح لـ [الاسم]، نورت!"],
        evening: ["مساء الخير والسرور يا [الاسم] ✨", "يا مساء الورد لعيون [الاسم]"]
      }
    };

    let state = {
      name: 'صديقي', gender: 'male', mode: 'auto',
      xp: 0, msgs: 0, lvl: 1, favTeam: '', unlockedAch: []
    };

    // تحميل وحفظ البيانات
    function loadData() {
      const saved = localStorage.getItem('bella_pro_v6_data');
      if(saved) {
        state = JSON.parse(saved);
        updateStats();
        state.unlockedAch.forEach(id => {
            const el = document.getElementById(`ach-${id}`);
            if(el) el.classList.add('unlocked');
        });
      }
    }
    function saveData() { localStorage.setItem('bella_pro_v6_data', JSON.stringify(state)); }

    function initApp(g) {
      const n = document.getElementById('userNameInput').value.trim();
      if(n) state.name = n;
      state.gender = g;
      document.body.className = g === 'female' ? 'theme-pink' : 'theme-blue';
      document.getElementById('startModal').classList.remove('show');
      document.getElementById('heroWelcome').innerText = `هلا بـ ${state.name}!`;
      saveData();
      unlockAch(1);
      openChat();
      addMessage('bot', `يا هلا بـ ${state.name}، نورتني! شلون أقدر أساعدك اليوم؟ 🇰🇼`);
    }

    function send() {
      const inp = document.getElementById('userInput');
      const val = inp.value.trim();
      if(!val) return;

      addMessage('user', val);
      inp.value = '';
      
      state.xp += 15;
      state.msgs += 1;
      updateStats();
      saveData();

      setTimeout(() => {
        let reply = getSuperSmartReply(val);
        reply = reply.replace(/\[الاسم\]/g, state.name);
        addMessage('bot', reply);
      }, 600);
    }

    function getSuperSmartReply(txt) {
      const low = txt.toLowerCase();

      // 1. الذكاء حسب المود (Emotional Intelligence)
      if(state.mode === 'mad') {
          return state.gender === 'female' ? "شتبين يا [الاسم]؟ خلصيني ماني فاضية! 💢" : "خلصني يا [الاسم] شتبي؟ مالي خلق! 💢";
      }
      if(state.mode === 'cute') {
          return state.gender === 'female' ? "يا بعد عمر بيلا أنتي، تدللي يا [الاسم] 💕" : "يا بعد قلبي يا [الاسم]، كلي لك 💕";
      }

      // 2. فحص الوقت
      if(low.includes("صباح")) return INTEL.time.morning[Math.floor(Math.random()*2)];
      if(low.includes("مساء")) return INTEL.time.evening[Math.floor(Math.random()*2)];

      // 3. محرك البحث الذكي في المجموعات
      for(let cat in INTEL) {
          if(INTEL[cat].keys && INTEL[cat].keys.some(k => low.includes(k))) {
              const pool = state.gender === 'female' ? INTEL[cat].f : INTEL[cat].m;
              return pool[Math.floor(Math.random() * pool.length)];
          }
      }

      // 4. الذاكرة العميقة (محفوظة)
      if(txt.includes("أحب فريق") || txt.includes("نادي")) {
          state.favTeam = txt.split("نادي")[1] || txt.split("فريق")[1];
          saveData();
          return `كفو والله يا [الاسم]! سجلت عندي إنك تشجع ${state.favTeam} ⚽`;
      }

      // 5. رد افتراضي
      return state.gender === 'female' ? "سولفي يالغالية [الاسم]، أسمعج.." : "آمر يا [الاسم]، شنو بخاطرك بعد؟";
    }

    function updateStats() {
      state.lvl = Math.floor(state.xp / 100) + 1;
      document.getElementById('s-msgs').innerText = state.msgs;
      document.getElementById('s-xp').innerText = state.xp + " XP";
      document.getElementById('s-lvl').innerText = state.lvl;
      const ranks = ["مبتدئ", "عضو مميز", "كويتي أصلي", "أسطورة الشات"];
      document.getElementById('s-rank').innerText = ranks[Math.min(state.lvl-1, 3)];
      if(state.msgs >= 10) unlockAch(3);
    }

    function unlockAch(id) {
      if(!state.unlockedAch.includes(id)) {
        state.unlockedAch.push(id);
        const el = document.getElementById(`ach-${id}`);
        if(el) el.classList.add('unlocked');
        saveData();
      }
    }

    function setMode(m, btn) {
      state.mode = m;
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('statusTxt').innerText = "متصلة • مود " + m;
      saveData();
    }

    function addMessage(type, text) {
      const box = document.getElementById('chatBox');
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      div.innerText = text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function openChat() { document.getElementById('chatShell').style.display = 'block'; }
    function closeChat() { document.getElementById('chatShell').style.display = 'none'; }

    window.onload = loadData;
  </script>
</body>
</html>
