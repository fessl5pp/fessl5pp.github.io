<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bella Pro - v4.0 Ultimate Edition</title>
  <style>
    /* الحفاظ على التنسيقات الأصلية مع إضافة ستايلات الميزات الجديدة */
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#09090b;--bg2:#121317;--panel:rgba(23,24,29,.92);--panel2:rgba(34,36,44,.95);
      --line:rgba(255,255,255,.08);--text:#fff;--muted:#b5bac5;--accent:#0a84ff;
      --pink:#ff4d8d;--gold:#ffcc00;--orange:#ff9f0a;--bot:#2b2d33;--user:#0a84ff;--bubble:#1b1d23;
      --shadow:0 22px 55px rgba(0,0,0,.35)
    }
    body.theme-pink{--accent:#ff4d8d;--user:#ff4d8d}
    body.theme-blue{--accent:#0a84ff;--user:#0a84ff}
    body{margin:0;min-height:100vh;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:radial-gradient(circle at top, rgba(109,94,252,.16), transparent 24%),linear-gradient(180deg,var(--bg),var(--bg2));
      padding:24px 14px 120px;text-align:center}
    
    .page{width:min(980px,100%);margin:0 auto}
    .hero{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:30px;padding:20px;margin-bottom:15px;backdrop-filter:blur(14px)}
    
    /* نظام الإحصائيات المطور */
    .statsGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:15px}
    .stat{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:20px;padding:12px 5px}
    .stat b{display:block;font-size:16px} .stat span{font-size:10px;color:var(--muted)}

    /* واجهة الشات والمودات */
    .chatShell{width:min(480px,calc(100% - 12px));position:fixed;left:50%;transform:translateX(-50%);bottom:12px;background:var(--panel);border:1px solid var(--line);border-radius:30px;overflow:hidden;box-shadow:var(--shadow);backdrop-filter:blur(18px);display:none;z-index:1000}
    .chatShell.open{display:block}
    .modeBar {display:flex;gap:8px;padding:10px;overflow-x:auto;background:rgba(0,0,0,0.3);border-bottom:1px solid var(--line);scrollbar-width:none}
    .pill {border:none;padding:8px 16px;border-radius:20px;background:rgba(255,255,255,0.06);color:white;cursor:pointer;white-space:nowrap;font-size:12px}
    .pill.active {background:var(--accent);font-weight:bold}

    /* سجل الإنجازات المصغر */
    .ach-shelf {display:flex;justify-content:center;gap:8px;margin-top:10px}
    .badge {width:35px;height:35px;background:rgba(255,255,255,0.05);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;filter:grayscale(1);transition:0.3s}
    .badge.unlocked {filter:grayscale(0);background:rgba(255,215,0,0.1);border:1px solid var(--gold)}

    .messages{height:320px;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:12px;background:#000}
    .msg{max-width:85%;padding:10px 15px;border-radius:20px;font-size:14px;line-height:1.5;animation:pop 0.2s ease-out}
    .msg.bot{align-self:flex-start;background:var(--bot);border-bottom-left-radius:4px}
    .msg.user{align-self:flex-end;background:var(--user);border-bottom-right-radius:4px}
    
    .inputArea{display:flex;gap:8px;padding:12px;background:var(--panel2)}
    input{flex:1;background:var(--bubble);border:1px solid var(--line);padding:12px;border-radius:15px;color:white;outline:none}
    .sendBtn{background:var(--accent);border:none;padding:0 20px;border-radius:15px;color:white;font-weight:bold;cursor:pointer}

    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:2000}
    .modal.show{display:flex}
    .card{background:#1c1d22;padding:25px;border-radius:30px;width:90%;max-width:400px;border:1px solid var(--line)}

    @keyframes pop { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body class="theme-blue">

  <div class="page">
    <section class="hero">
      <div id="xpInfo" style="text-align:right; margin-bottom:10px">
        <div style="display:flex; justify-content:space-between; font-size:12px">
          <b id="lvlText">LVL 1</b>
          <span id="xpText">0 / 100 XP</span>
        </div>
        <div style="width:100%; height:6px; background:rgba(255,255,255,0.1); border-radius:10px; margin-top:4px">
          <div id="xpFill" style="width:0%; height:100%; background:var(--gold); border-radius:10px; transition:0.4s"></div>
        </div>
      </div>
      <h1 id="welcomeHeader">هلا بالزين!</h1>
      <div class="ach-shelf">
        <div class="badge" id="ach-1" title="صديق جديد">🌱</div>
        <div class="badge" id="ach-2" title="كويتي أصلي">🇰🇼</div>
        <div class="badge" id="ach-3" title="الثرثار">💬</div>
        <div class="badge" id="ach-4" title="المستكشف">📍</div>
      </div>
      <button class="sendBtn" style="padding:12px 25px; margin-top:15px" onclick="openChat()">سولف مع بيلا 💬</button>
    </section>

    <section class="statsGrid">
      <div class="stat"><b id="s-msgs">0</b><span>رسائل</span></div>
      <div class="stat"><b id="s-days">1</b><span>أيام</span></div>
      <div class="stat"><b id="s-task">0/3</b><span>مهام</span></div>
      <div class="stat"><b id="s-rank">مبتدئ</b><span>رتبة</span></div>
    </section>
  </div>

  <div class="chatShell" id="chatShell">
    <div class="modeBar" id="modeBar">
      <button class="pill active" onclick="setMode('auto', this)">🤖 أوتو</button>
      <button class="pill" onclick="setMode('cute', this)">💕 دلوعة</button>
      <button class="pill" onclick="setMode('calm', this)">🤍 مروقة</button>
      <button class="pill" onclick="setMode('mad', this)">💢 معصبة</button>
    </div>
    <div class="messages" id="chatBox"></div>
    <div class="inputArea">
      <input type="text" id="userInput" placeholder="شنو بخاطرك؟" onkeypress="if(event.key==='Enter') send()">
      <button class="sendBtn" onclick="send()">إرسال</button>
    </div>
  </div>

  <div class="modal show" id="startModal">
    <div class="card">
      <h2 style="margin-top:0">منورنا يا بطل! 🇰🇼</h2>
      <p style="color:var(--muted); font-size:14px">Bella تبي تعرف اسمك عشان تضبط السوالف معاك</p>
      <input type="text" id="nameInp" style="width:100%; padding:12px; margin:15px 0; border-radius:10px; border:1px solid var(--line); background:#000; color:#fff; text-align:center" placeholder="اكتب اسمك هنا..">
      <div style="display:flex; gap:10px">
        <button class="sendBtn" style="flex:1" onclick="start('male')">👨 ولد</button>
        <button class="sendBtn" style="flex:1; background:var(--pink)" onclick="start('female')">👩 بنت</button>
      </div>
    </div>
  </div>

  <script>
    // --- النظام المطور (ذاكرة + رادار + مهام + إنجازات) ---
    const state = {
      name: 'صديقي', gender: 'male', mode: 'auto',
      xp: 0, lvl: 1, msgs: 0, 
      favFood: '', team: '', // الذاكرة العميقة (رقم 3)
      tasksDone: 0,
      unlockedAch: []
    };

    // القاموس والرادار (رقم 4)
    const KUWAIT_GUIDE = {
      "قهوة": "أنصحك بـ 'بون كافيه' أو 'ڤي ٦٠' بالشويخ، الجو هناك خيال!",
      "عشا": "جرب 'ميس الغانم' عالبحر، أو 'فريج صويلح' إذا تبي عيش وحشو أصلي",
      "تمشى": "الأفنيوز دايم خيار صح، أو روح 'حديقة الشهيد' الجو الحين يجنن"
    };

    const SMALL_TALK = {
        "هلا": { m: "هلا بـ [الاسم]! نورت يا حبيب", f: "أهلين بـ [الاسم]! نورتي يا قلبي" },
        "شلونك": { m: "بخير يا [الاسم]، أنت شلونك؟", f: "بخير يا [الاسم]، أنتي شلونج؟" }
    };

    function start(g) {
      const n = document.getElementById('nameInp').value.trim();
      if(n) state.name = n;
      state.gender = g;
      document.body.className = g === 'female' ? 'theme-pink' : 'theme-blue';
      document.getElementById('startModal').classList.remove('show');
      document.getElementById('welcomeHeader').innerText = `هلا بـ ${state.name}!`;
      openChat();
      addMessage('bot', `هلا والله بـ ${state.name}، نورتني يا وحش! قولي شنو بخاطرك اليوم؟ 🇰🇼`);
      unlockAch(1); // إنجاز الدخول الأول
    }

    function send() {
      const inp = document.getElementById('userInput');
      const text = inp.value.trim();
      if(!text) return;

      addMessage('user', text);
      inp.value = '';
      
      // تحديث XP ومهام (رقم 2)
      state.xp += 10;
      state.msgs++;
      if(state.msgs === 5) unlockAch(3); // إنجاز الثرثار
      
      updateStats();

      setTimeout(() => {
        let reply = processAI(text);
        reply = reply.replace(/\[الاسم\]/g, state.name);
        addMessage('bot', reply);
      }, 700);
    }

    function processAI(text) {
      const low = text.toLowerCase();
      
      // 1. الذاكرة العميقة (رقم 3)
      if(text.includes("أحب") && (text.includes("فريق") || text.includes("نادي"))) {
          state.team = text.split("أحب")[1];
          return `تم! سجلت عندي إنك تشجع ${state.team}.. كفو والله يا [الاسم]!`;
      }
      if(text.includes("شنو فريقي") && state.team) return `فريقك هو ${state.team}، لا تنسى إني أحفظ أسرارك 😉`;

      // 2. رادار الأماكن (رقم 4)
      if(text.includes("وين") || text.includes("اقترح")) {
          for(let key in KUWAIT_GUID_E = KUWAIT_GUIDE) {
              if(text.includes(key)) return KUWAIT_GUIDE[key];
          }
      }

      // 3. القاموس العادي والمودات
      for(let key in SMALL_TALK) {
        if(low.includes(key)) return state.gender === 'female' ? SMALL_TALK[key].f : SMALL_TALK[key].m;
      }

      if(state.mode === 'mad') return "خلصني يا [الاسم] ماني فاضية!";
      if(state.mode === 'cute') return "يا بعد عيون بيلا يا [الاسم]، تدلل 💕";
      
      return "سولف بعد يا [الاسم]، كلامك ما ينمل منه!";
    }

    function unlockAch(id) {
        if(!state.unlockedAch.includes(id)) {
            state.unlockedAch.push(id);
            const el = document.getElementById(`ach-${id}`);
            el.classList.add('unlocked');
            addSystem(`✨ إنجاز جديد: ${el.title}`);
        }
    }

    function updateStats() {
      state.lvl = Math.floor(state.xp / 100) + 1;
      document.getElementById('lvlText').innerText = "LVL " + state.lvl;
      document.getElementById('xpText').innerText = `${state.xp % 100} / 100 XP`;
      document.getElementById('xpFill').style.width = (state.xp % 100) + "%";
      document.getElementById('s-msgs').innerText = state.msgs;
      document.getElementById('s-lvl').innerText = state.lvl;
      
      const ranks = ["مبتدئ", "عضو مميز", "كويتي أصلي", "وزير السوالف"];
      document.getElementById('s-rank').innerText = ranks[Math.min(state.lvl-1, 3)];
    }

    function setMode(m, btn) {
      state.mode = m;
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
    }

    function addMessage(type, text) {
      const box = document.getElementById('chatBox');
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      div.innerText = text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function addSystem(txt) {
      const box = document.getElementById('chatBox');
      const div = document.createElement('div');
      div.style = "font-size:11px; color:var(--gold); text-align:center; margin:5px 0";
      div.innerText = txt;
      box.appendChild(div);
    }

    function openChat() { document.getElementById('chatShell').classList.add('open'); }
  </script>
</body>
</html>
