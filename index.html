<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bella Ultra Pro v8.5</title>
  <style>
    /* التنسيق المتطور - الزجاجي */
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;transition:0.3s ease}
    :root{--bg:#050505;--accent:#0a84ff;--panel:rgba(28,28,30,0.8);--line:rgba(255,255,255,0.1);--text:#fff}
    body.theme-pink{--accent:#ff375f}
    body{margin:0;background:var(--bg);color:var(--text);font-family:sans-serif;padding-bottom:100px}
    
    /* الجزيرة الديناميكية */
    .top-island{position:sticky;top:10px;width:90%;max-width:500px;margin:0 auto;background:var(--panel);backdrop-filter:blur(20px);border-radius:50px;padding:10px 20px;display:flex;justify-content:space-around;border:1px solid var(--line);z-index:100}
    .top-island b{color:var(--accent);display:block;font-size:14px}
    .top-island span{font-size:10px;color:#888}

    /* رف الأوسمة */
    .badges{display:flex;justify-content:center;gap:10px;margin:20px 0}
    .badge{width:45px;height:45px;background:rgba(255,255,255,0.05);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;filter:grayscale(1);border:1px solid var(--line)}
    .badge.on{filter:grayscale(0);border-color:#ffd60a;background:rgba(255,214,10,0.1)}

    /* شات الشل */
    .chat-win{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:1000}
    .chat-win.active{display:flex}
    .header{padding:15px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;justify-content:space-between}
    
    .modes-bar{display:flex;gap:8px;padding:10px;overflow-x:auto;background:rgba(0,0,0,0.3)}
    .mode-btn{padding:8px 15px;border-radius:20px;border:1px solid var(--line);background:none;color:#fff;font-size:12px;white-space:nowrap}
    .mode-btn.active{background:var(--accent);border-color:var(--accent)}

    .msg-box{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:15px}
    .m{max-width:80%;padding:12px 16px;border-radius:20px;font-size:15px;line-height:1.5}
    .m.bot{align-self:flex-start;background:#262629;border-bottom-left-radius:5px}
    .m.user{align-self:flex-end;background:var(--accent);border-bottom-right-radius:5px}

    .sug-row{padding:10px;display:flex;gap:8px;overflow-x:auto}
    .sug-btn{padding:6px 12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;color:#eee;font-size:12px;white-space:nowrap}

    .input-area{padding:15px;background:var(--panel);display:flex;gap:10px}
    input{flex:1;background:#000;border:1px solid var(--line);padding:12px;border-radius:15px;color:#fff;outline:none}
    .send{background:var(--accent);border:none;padding:10px 20px;border-radius:15px;color:#fff;font-weight:bold}

    .modal{position:fixed;inset:0;background:#000;z-index:2000;display:flex;align-items:center;justify-content:center}
  </style>
</head>
<body class="theme-blue">

<div class="top-island">
  <div style="text-align:center"><b id="xp-val">0</b><span>XP</span></div>
  <div style="text-align:center"><b id="rank-val">مبتدئ</b><span>الرتبة</span></div>
  <div style="text-align:center"><b id="lvl-val">1</b><span>Level</span></div>
</div>

<div style="text-align:center;padding:40px 20px">
  <h1 style="font-size:40px">Bella Pro</h1>
  <div class="badges">
    <div class="badge" id="b1">🌱</div><div class="badge" id="b2">💬</div><div class="badge" id="b3">📍</div><div class="badge" id="b4">☕</div>
  </div>
  <button class="send" style="padding:15px 40px" onclick="openChat()">سولف الحين ⚡</button>
</div>

<div class="chat-win" id="win">
  <div class="header">
    <b>Bella Ultra v8.5</b>
    <button onclick="closeChat()" style="background:none;border:none;color:var(--accent)">إغلاق ✕</button>
  </div>
  
  <div class="modes-bar" id="mBar">
    <button class="mode-btn active" onclick="setMode('auto',this)">🤖 أوتو</button>
    <button class="mode-btn" onclick="setMode('cute',this)">💕 دلع</button>
    <button class="mode-btn" onclick="setMode('fun',this)">😎 فلة</button>
    <button class="mode-btn" onclick="setMode('calm',this)">🤍 رايق</button>
    <button class="mode-btn" onclick="setMode('mad',this)">😒 معصب</button>
  </div>

  <div class="msg-box" id="box"></div>
  <div class="sug-row" id="sug"></div>

  <div class="input-area">
    <input type="text" id="inp" placeholder="سولف مع الذكاء الخارق..." onkeypress="if(event.key==='Enter') send()">
    <button class="send" onclick="send()">إرسال</button>
  </div>
</div>

<div class="modal" id="setup">
  <div style="text-align:center;width:80%">
    <h2>نورتنا! 🇰🇼</h2>
    <input type="text" id="uName" style="width:100%;margin-bottom:20px;text-align:center" placeholder="اسمك الكريم">
    <div style="display:flex;gap:10px">
      <button class="send" style="flex:1" onclick="init('male')">ولد 👨</button>
      <button class="send" style="flex:1;background:#ff375f" onclick="init('female')">بنت 👩</button>
    </div>
  </div>
</div>

<script>
// القاموس العملاق 500+ (تم الدمج)
const BRAIN = {
  radar: {
    eat: ["جرب 'مروج' الصراحة خيال 🍔", "عندك 'الأفنيوز' فيه كل شي بخاطرك", "سوق المباركية حق القعدة الشعبية 👍"],
    coffee: ["كافيهات 'الشويخ' صايرة هبة ☕", "روح 'أسواق القرين' هادية وحلوة", "عندك 'الخيران' إذا تبي بحر ومزاج"]
  },
  memory: { team: "" }
};

let s = { name: "صديقي", g: "male", mode: "auto", xp: 0, lvl: 1, ach: [] };

window.onload = () => {
  const saved = localStorage.getItem('bella_final_v85');
  if(saved) { s = JSON.parse(saved); document.getElementById('setup').style.display='none'; updateUI(); }
};

function init(g) {
  const n = document.getElementById('uName').value.trim();
  if(n) s.name = n;
  s.g = g;
  document.body.className = g === 'female' ? 'theme-pink' : 'theme-blue';
  document.getElementById('setup').style.display = 'none';
  save(); openChat();
  botMsg(`يا هلا بـ ${s.name}! نورتنا.. أنا Bella بذكائي الجديد. آمرني؟ ✨`);
}

function send(forced) {
  const i = document.getElementById('inp');
  const v = forced || i.value.trim();
  if(!v) return;
  
  userMsg(v);
  i.value = '';
  s.xp += 15;
  if(s.xp % 100 === 0) s.lvl++;
  updateUI(); save();

  setTimeout(() => {
    const reply = logic(v);
    botMsg(reply);
    showSug(v);
  }, 600);
}

function logic(t) {
  const low = t.toLowerCase();
  const suf = s.g === 'female' ? 'ج' : 'ك';
  
  // رادار
  if(low.includes("مطعم") || low.includes("اتعشى")) { onAch('b3'); return pick(BRAIN.radar.eat); }
  if(low.includes("قهوة") || low.includes("اتقهوى")) { 
    onAch('b4'); 
    setMode('calm', document.querySelectorAll('.mode-btn')[3]); 
    return "أبشر.. عدلت مزاجي لـ 'رايق' ☕. " + pick(BRAIN.radar.coffee); 
  }
  
  // ذاكرة
  if(low.includes("نادي") || low.includes("اشجع")) { s.memory.team = t.split(" ").pop(); save(); return `كفو! سجلت عندي إنك ${s.memory.team} ⚽`; }
  if(low.includes("فريقي")) return s.memory.team ? `إنت تشجع ${s.memory.team} يا بطل` : "للحين ما قلت لي شنو تشجع!";
  
  // نور والردود الخاصة
  if(low.includes("نور")) return `نور دنيا${suf} يا بعد روحي.. هواييي وماي 🤍`;
  if(low.includes("شلون")) return `بخير ربي يسلم${suf}، إنت شخبار${suf}؟`;
  if(low.includes("نكتة") || low.includes("ضحكني")) return "مرة واحد كويتي راح يسوي ريجيم، أكل خبزة رقاق بدل اللبنانية 😂";

  return s.g === 'female' ? "آمري يا قلبي، شنو بخاطرج بعد؟" : "آمر يا الحبيب، شنو بخاطرك؟";
}

function showSug(last) {
  const row = document.getElementById('sug');
  row.innerHTML = '';
  const opts = ["شنو تقترحين؟", "ملل ضحكيني", "وين أتعشى؟", "شنو فريقي؟"];
  opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'sug-btn';
    b.innerText = o;
    b.onclick = () => send(o);
    row.appendChild(b);
  });
}

function userMsg(t) {
  const d = document.createElement('div'); d.className = 'm user'; d.innerText = t;
  document.getElementById('box').appendChild(d);
  scroll();
}

function botMsg(t) {
  const d = document.createElement('div'); d.className = 'm bot'; d.innerText = t;
  document.getElementById('box').appendChild(d);
  scroll();
}

function setMode(m, btn) {
  s.mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  save();
}

function onAch(id) {
  if(!s.ach.includes(id)) { s.ach.push(id); document.getElementById(id).classList.add('on'); save(); }
}

function updateUI() {
  document.getElementById('xp-val').innerText = s.xp;
  document.getElementById('lvl-val').innerText = s.lvl;
  const ranks = ["مبتدئ", "عضو مميز", "كويتي أصلي", "أسطورة"];
  document.getElementById('rank-val').innerText = ranks[Math.min(s.lvl-1, 3)];
  s.ach.forEach(id => document.getElementById(id)?.classList.add('on'));
}

function save() { localStorage.setItem('bella_final_v85', JSON.stringify(s)); }
function openChat() { document.getElementById('win').classList.add('active'); }
function closeChat() { document.getElementById('win').classList.remove('active'); }
function scroll() { const b = document.getElementById('box'); b.scrollTop = b.scrollHeight; }
function pick(a) { return a[Math.floor(Math.random()*a.length)]; }
</script>
</body>
</html>
